<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>State Of The Art - Silhouette Study</title>
<style>
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  overflow:hidden;
  background:#000;
  font-family:sans-serif;
}

.scene{
  position:relative;
  width:100%;
  height:100%;
  display:grid;
  place-items:center;
  background:#000;
}

.frame{
  position:relative;
  width:min(78vw,960px);
  aspect-ratio:4/3;
  overflow:hidden;
  background:
    radial-gradient(circle at 74% 70%, rgba(239,255,104,.96) 0 18%, rgba(239,255,104,.72) 18%, rgba(239,255,104,.18) 34%, transparent 52%),
    radial-gradient(circle at 62% 60%, rgba(241,255,164,.58) 0 16%, transparent 44%),
    linear-gradient(180deg, #f3f4ea 0%, #efefe4 100%);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.06),
    0 28px 90px rgba(0,0,0,.65);
}

.frame::before{
  content:"";
  position:absolute;
  left:34%;
  top:-7%;
  width:9%;
  height:58%;
  background:linear-gradient(180deg, rgba(246,255,103,.9), rgba(234,255,96,.1));
  filter:blur(10px);
  transform:rotate(19deg);
  opacity:.95;
}

.frame::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(180deg, rgba(255,255,255,.028) 0 2px, transparent 2px 4px),
    radial-gradient(circle at 50% 50%, transparent 58%, rgba(0,0,0,.08) 100%);
  mix-blend-mode:multiply;
  pointer-events:none;
}

.silhouette{
  position:absolute;
  left:50%;
  bottom:-2%;
  width:48%;
  height:92%;
  transform:translateX(-50%);
  transform-origin:50% 86%;
  animation:groove 2.7s ease-in-out infinite;
  filter:drop-shadow(0 0 1px rgba(0,0,0,.25));
}

.silhouette svg{
  width:100%;
  height:100%;
  display:block;
  overflow:visible;
}

.body{fill:#0b0b0b}

.head,
.torso,
.hip,
.arm-left,
.arm-right,
.leg-left,
.leg-right{
  transform-box:fill-box;
}

.head{
  transform-origin:58% 90%;
  animation:headMove 2.7s ease-in-out infinite;
}

.torso{
  transform-origin:50% 32%;
  animation:torsoMove 2.7s ease-in-out infinite;
}

.hip{
  transform-origin:50% 14%;
  animation:hipMove 2.7s ease-in-out infinite;
}

.arm-left{
  transform-origin:82% 12%;
  animation:armLeftMove 2.7s ease-in-out infinite;
}

.arm-right{
  transform-origin:18% 16%;
  animation:armRightMove 2.7s ease-in-out infinite;
}

.phone{
  transform-box:fill-box;
  transform-origin:50% 50%;
  animation:phoneMove 2.7s ease-in-out infinite;
}

.leg-left{
  transform-origin:62% 8%;
  animation:legLeftMove 2.7s ease-in-out infinite;
}

.leg-right{
  transform-origin:40% 8%;
  animation:legRightMove 2.7s ease-in-out infinite;
}

.grain{
  position:absolute;
  inset:0;
  opacity:.08;
  background-image:
    radial-gradient(circle at 20% 30%, #000 0 .7px, transparent .8px),
    radial-gradient(circle at 70% 40%, #000 0 .7px, transparent .8px),
    radial-gradient(circle at 40% 80%, #000 0 .7px, transparent .8px);
  background-size:11px 11px, 15px 15px, 17px 17px;
  mix-blend-mode:multiply;
  pointer-events:none;
}

@keyframes groove{
  0%,100%{transform:translateX(-50%) translateY(0) rotate(-1.2deg)}
  25%{transform:translateX(-50%) translateY(-1.2%) rotate(.8deg)}
  50%{transform:translateX(-50%) translateY(-3.2%) rotate(-1.8deg)}
  75%{transform:translateX(-50%) translateY(-1%) rotate(1.2deg)}
}

@keyframes headMove{
  0%,100%{transform:rotate(-7deg)}
  50%{transform:rotate(-1deg)}
}

@keyframes torsoMove{
  0%,100%{transform:rotate(-2deg)}
  50%{transform:rotate(2deg)}
}

@keyframes hipMove{
  0%,100%{transform:rotate(1deg)}
  50%{transform:rotate(-2.5deg)}
}

@keyframes armLeftMove{
  0%,100%{transform:rotate(-2deg)}
  50%{transform:rotate(10deg)}
}

@keyframes armRightMove{
  0%,100%{transform:rotate(-6deg)}
  50%{transform:rotate(-14deg)}
}

@keyframes phoneMove{
  0%,100%{transform:rotate(-6deg) translateY(0)}
  50%{transform:rotate(-1deg) translateY(-2%)}
}

@keyframes legLeftMove{
  0%,100%{transform:rotate(1deg)}
  50%{transform:rotate(-4deg)}
}

@keyframes legRightMove{
  0%,100%{transform:rotate(-1deg)}
  50%{transform:rotate(5deg)}
}

@media (max-width: 900px){
  .frame{width:min(92vw,960px)}
  .silhouette{width:54%;height:94%}
}
</style>
</head>
<body>
<main class="scene">
  <div class="frame">

        <g>

          </g>
        </g>
      </svg>
    </div>
    <div class="grain"></div>
  </div>
</main>
</body>
</html>
