<script>
(()=>{'use strict';

const FX=['(TXT) TYPEWRITER','(TXT) FADE','(TXT) SLIDE','(TXT) SCALE','FADE IN / OUT','POSITION (X/Y)','SCALE','ROTATION','OPACITY','BLUR','GLITCH','SHAKE','WAVE','SCANLINES','STROBE','INVERT','POSTER','PIXELATE','BOUNCE','DANCE'];
let S={lang:'fr',mode:'pro',playing:false,t0:0,now:0,duration:6,sel:0,selSeg:0,selAsset:null,amp:0,audioMode:'scale',layers:[],segments:[{id:uid(),name:'SEG 1',start:0,dur:3},{id:uid(),name:'SEG 2',start:3,dur:3}],assets:[],snaps:[],undo:[],redo:[]};
let audioCtx, analyser, dataArr, raf, drag=null;
function uid(){return Math.random().toString(36).slice(2,9)}; const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function defLayer(type='text'){return {id:uid(),type,name:type==='text'?'TEXT':'BLOCK',text:type==='text'?'DEMOFORGE':'',x:W/2,y:H/2,w:360,h:110,color:'#efe9d9',fill:'#1a1a1a',font:54,opacity:1,scale:1,rotation:0,visible:true,locked:false,asset:null,effects:[],expr:{}}}
function init(){S.layers=[defLayer('shape'),defLayer('text')];S.layers[0].name='PAPER BLOCK';S.layers[0].w=520;S.layers[0].h=180;S.layers[0].fill='#e5ddc8';S.layers[1].name='TITLE';S.layers[1].text='DEMOFORGE';S.layers[1].fill='#1a1a1a';bind();renderUI();draw();}
function bind(){FX.forEach(f=>{let b=document.createElement('button');b.className='effectBtn';b.textContent=f;b.onclick=()=>applyFx(f);$('effects').appendChild(b)});$('lang').onchange=e=>{S.lang=e.target.value;applyLang();};['modeNoob','modePro','modeMax'].forEach((id,i)=>$(id).onclick=()=>{S.mode=['noob','pro','max'][i];renderUI()});$('addText').onclick=()=>addLayer('text');$('addShape').onclick=()=>addLayer('shape');$('addCard').onclick=()=>addLayer('card');$('delLayer').onclick=delLayer;$('dupLayer').onclick=dup;$('upLayer').onclick=()=>move(-1);$('downLayer').onclick=()=>move(1);$('play').onclick=play;$('stop').onclick=stop;$('fs').onclick=()=>$('canvasBox').requestFullscreen();$('fullscreenExport').onclick=()=>{play();$('canvasBox').requestFullscreen()};$('addSeg').onclick=addSeg;$('delSeg').onclick=delSeg;$('segUp').onclick=()=>moveSeg(-1);$('segDown').onclick=()=>moveSeg(1);$('scrub').oninput=e=>{S.now=+e.target.value*S.duration;S.playing=false;draw();renderTimeline()};$('track').addEventListener('pointerdown',segDown);window.addEventListener('pointermove',segMove);window.addEventListener('pointerup',()=>drag=null);$('media').onchange=e=>readFiles(e.target.files);$('audioFile').onchange=e=>loadAudio(e.target.files[0]);$('audioMode').onchange=e=>S.audioMode=e.target.value;$('assignAsset').onclick=assignAsset;$('applyExpr').onclick=()=>{let l=sel();if(l){hist();l.expr[$('exprTarget').value]=$('expr').value;draw();renderProps()}};$('exprTarget').onchange=()=>{let l=sel();$('expr').value=l?.expr[$('exprTarget').value]||''};$('applyPreset').onclick=()=>preset($('preset').value);$('save').onclick=()=>$('exportJson').click();$('loadBtn').onclick=()=>$('loadJson').click();$('loadJson').onchange=e=>loadJson(e.target.files[0]);$('exportJson').onclick=()=>download('demoforge_project.json',JSON.stringify(cleanProject(),null,2),'application/json');$('exportHtml').onclick=exportHtml;$('snap').onclick=snapshot;['dragover','drop'].forEach(ev=>$('drop').addEventListener(ev,e= function applyLang(){document.documentElement.lang=S.lang;let d=I18N[S.lang];document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=d[el.dataset.i18n]||el.textContent});}
function hist(){S.undo.push(JSON.stringify(cleanProject())); if(S.undo.length>60)S.undo.shift();S.redo=[]}
function cleanProject(){return {...S,assets:S.assets.map(a=>({...a,el:null,thumb:null})),undo:[],redo:[],playing:false}}
function loadJson(f){if(!f)return;let r=new FileReader();r.onload=()=>{try{Object.assign(S,JSON.parse(r.result));S.assets=[];renderUI();draw()}catch(e){alert('BAD JSON')}};r.readAsText(f)}
function addLayer(type){hist();S.layers.push(defLayer(type));S.sel=S.layers.length-1;renderUI();draw()}
function sel(){return S.layers[S.sel]}
function delLayer(){if(!S.layers.length)return;hist();S.layers.splice(S.sel,1);S.sel=clamp(S.sel,0,S.layers.length-1);renderUI();draw()}
function dup(){let l=sel();if(!l)return;hist();S.layers.splice(S.sel+1,0,JSON.parse(JSON.stringify({...l,id:uid(),name:l.name+' COPY'})));S.sel++;renderUI();draw()}
function move(d){let i=S.sel,j=i+d;if(j<0||j>=S.layers.length)return;hist();[S.layers[i],S.layers[j]]=[S.layers[j],S.layers[i]];S.sel=j;renderUI();draw()}
function applyFx(f){let l=sel();if(!l)return;hist();if(!l.effects.includes(f))l.effects.push(f);renderProps();draw()}
function addSeg(){hist();let end=Math.max(...S.segments.map(s=>s.start+s.dur),0);S.segments.push({id:uid(),name:'SEG '+(S.segments.length+1),start:end,dur:2});S.duration=end+2;S.selSeg=S.segments.length-1;renderTimeline()}

function moveSeg(d){let i=S.selSeg,j=i+d;if(j<0||j>=S.segments.length)return;hist();[S.segments[i],S.segments[j]]=[S.segments[j],S.segments[i]];S.selSeg=j;renderTimeline()}
function syncDuration(){S.duration=Math.max(1,...S.segments.map(s=>s.start+s.dur));$('scrub').value=S.now/S.duration}
function renderUI(){applyLang();['modeNoob','modePro','modeMax'].forEach((id,i)=>$(id).classList.toggle('on',S.mode===['noob','pro','max'][i]));renderLayers();renderAssets();renderProps();renderTimeline();}
function renderLayers(){let box=$('layers');box.innerHTML='';S.layers.forEach((l,i)=>{let d=document.createElement('div');d.className='layer '+(i===S.sel?'sel':'');d.draggable=true;d.innerHTML='<div><b>'+esc(l.name)+'</b></div><div class="meta">'+l.type+' / '+Math.round(l.opacity*100)+'% / '+l.effects.length+' FX</div><div class="row"><button>VIS</button><button>LOCK</button></div>';d.onclick=e=>{if(e.target.tagName!=='BUTTON'){S.sel=i;renderUI();draw()}};let bs=d.querySelectorAll('button');bs[0].onclick=e=>{e.stopPropagation();l.visible=!l.visible;draw();renderLayers()};bs[1].onclick=e=>{e.stopPropagation();l.locked=!l.locked;renderLayers()};d.ondragstart=()=>drag={kind:'layer',i};d.ondragover=e=>e.preventDefault();d.ondrop=e=>{e.preventDefault();if(drag?.kind==='layer'){let a=drag.i,b=i;if(a!==b){hist();let [x]=S.layers.splice(a,1);S.layers.splice(b,0,x);S.sel=b;renderUI();draw()}}};box.appendChild(d)})}
function renderProps(){let l=sel(), p=$('props'); if(!l){p.innerHTML='NO LAYER';return} let fields=[['name','NAME','text'],['text','TEXT','text'],['x','X','range',0,W],['y','Y','range',0,H],['w','WIDTH','range',10,W],['h','HEIGHT','range',10,H],['font','FONT','range',10,140],['scale','SCALE','range',0.1,4,0.01],['rotation','ROTATION','range',-180,180],['opacity','OPACITY','range',0,1,0.01],['fill','FILL','color'],['color','PAPER','color']];p.innerHTML='';fields.forEach(f=>{let [k,lab,t,min,max,step]=f;if(l.type!=='text'&&k==='text')return;let w=document.createElement('div');w.className='kv';w.innerHTML='<label>'+lab+'</label><input>';let inp=w.querySelector('input');inp.type=t;inp.value=l[k];if(t==='range'){inp.min=min;inp.max=max;inp.step=step||1}inp.oninput=()=>{l[k]=t==='text'||t==='color'?inp.value:+inp.value;draw();renderLayers()};p.appendChild(w)});let fx=document.createElement('div');fx.className='stack';fx.innerHTML='<div class="muted">FX STACK</div>'+l.effects.map((f,i)=>'<button data-i="'+i+'">'+esc(f)+' ×</button>').join('');fx.onclick=e=>{if(e.target.dataset.i){hist();l.effects.splice(+e.target.dataset.i,1);renderProps();draw()}};p.appendChild(fx);$('expr').value=l.expr[$('exprTarget').value]||''}

function segDown(e){if(e.target!==$('track')&&e.target!==$('ruler'))return;let r=$('track').getBoundingClientRect();S.now=clamp((e.clientX-r.left)/r.width*S.duration,0,S.duration);S.playing=false;renderTimeline();draw()}

function stop(){S.playing=false;S.now=0;$('play').textContent='PLAY';$('audio').pause();$('audio').currentTime=0;draw();renderTimeline()}
function loop(){if(!S.playing)return;S.now=(performance.now()-S.t0)/1000;if(S.now>S.duration){S.now=0;S.t0=performance.now()}sampleAudio();draw();renderTimeline();raf=requestAnimationFrame(loop)}
function sampleAudio(){if(!analyser)return;analyser.getByteFrequencyData(dataArr);let sum=0;for(let i=0;i<dataArr.length;i++)sum+=dataArr[i];S.amp=clamp(sum/dataArr.length/180,0,1);$('amp').textContent='AUDIO '+S.amp.toFixed(2);renderWave(dataArr)}
function loadAudio(f){if(!f)return;let url=URL.createObjectURL(f);$('audio').src=url;setupAudio()}
function setupAudio(){if(audioCtx)return;audioCtx=new (AudioContext||webkitAudioContext)();analyser=audioCtx.createAnalyser();analyser.fftSize=64;dataArr=new Uint8Array(analyser.frequencyBinCount);let src=audioCtx.createMediaElementSource($('audio'));src.connect(analyser);analyser.connect(audioCtx.destination)}
function renderWave(arr){let w=$('wave'); if(!arr){w.innerHTML=''; for(let i=0;i<32;i++){let b=document.createElement('div');b.className='bar';b.style.height='1px';w.appendChild(b)}return} if(w.children.length!==arr.length){w.innerHTML='';arr.forEach(()=>{let b=document.createElement('div');b.className='bar';w.appendChild(b)})} [...w.children].forEach((b,i)=>b.style.height=(1+arr[i]/255*40)+'px')}
function evalExpr(expr,time,audio,base){if(!expr)return base; if(!/^[0-9+\-*/().,\s_a-zA-Z]+$/.test(expr))return base; let safe=expr.toLowerCase().replace(/sin/g,'Math.sin').replace(/cos/g,'Math.cos').replace(/abs/g,'Math.abs').replace(/min/g,'Math.min').replace(/max/g,'Math.max').replace(/time/g,'('+time+')').replace(/audio/g,'('+audio+')');try{return Function('return '+safe)()}catch(e){return base}}
function activeLocalTime(){let t=S.now, acc=0; for(let i=0;i<S.segments.length;i++){let s=S.segments[i]; if(t>=acc&&t<acc+s.dur){S.selSeg=i; return t-acc} acc+=s.dur} return t}
function layerValues(l){let t=activeLocalTime(), a=S.amp, v={x:l.x,y:l.y,scale:l.scale,rot:l.rotation,op:l.opacity}; let p=clamp(t/Math.max(.001,S.segments[S.selSeg]?.dur||S.duration),0,1); l.effects.forEach(f=>{if(f==='(TXT) FADE'||f==='FADE IN / OUT')v.op*=p<.5?p*2:(1-p)*2;if(f==='(TXT) SLIDE'||f==='POSITION (X/Y)')v.x+=(-120+240*p);if(f==='(TXT) SCALE'||f==='SCALE')v.scale*=.65+p*.45;if(f==='ROTATION')v.rot+=360*p;if(f==='OPACITY')v.op*=.5+.5*Math.sin(t*4);if(f==='SHAKE'){v.x+=Math.sin(t*48)*8;v.y+=Math.cos(t*41)*6}if(f==='BOUNCE')v.y-=Math.abs(Math.sin(t*6))*40;if(f==='DANCE'){v.x+=Math.sin(t*3+a*4)*35*a;v.y+=Math.cos(t*5)*25*a;v.rot+=Math.sin(t*8)*8*a}if(f==='GLITCH')v.x+=(Math.random()-.5)*8;if(f==='WAVE')v.y+=Math.sin(t*4+l.y*.01)*30;if(f==='STROBE')v.op*=Math.sin(t*30)>0?1:.15}); if(S.audioMode==='scale')v.scale*=1+a*.35;if(S.audioMode==='bounce')v.y-=a*70;if(S.audioMode==='dance'){v.x+=Math.sin(t*5)*a*60;v.rot+=Math.sin(t*7)*a*12} for(const k of ['x','y','scale','rotation','opacity']){let kk=k==='rotation'?'rot':k==='opacity'?'op':k;v[kk]=evalExpr(l.expr[k],S.now,a,v[kk])} return v}
function draw(){X.clearRect(0,0,W,H);X.fillStyle='#111';X.fillRect(0,0,W,H);X.save();X.globalAlpha=.08;X.strokeStyle='#efe9d9';for(let x=0;x<W;x+=40){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke()}for(let y=0;y<H;y+=40){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke()}X.restore();S.layers.forEach(l=>{if(!l.visible)return;let v=layerValues(l);X.save();X.translate(v.x,v.y);X.rotate(v.rot*Math.PI/180);X.scale(v.scale,v.scale);X.globalAlpha=clamp(v.op,0,1);let glitch=l.effects.includes('GLITCH'), pix=l.effects.includes('PIXELATE'); if(l.asset){let a=S.assets.find(x=>x.id===l.asset);if(a?.el)X.drawImage(a.el,-l.w/2,-l.h/2,l.w,l.h)} else if(l.type==='text'){X.fillStyle=l.fill;X.textAlign='center';X.textBaseline='middle';X.font='700 '+l.font+'px '+getComputedStyle(document.body).fontFamily;let txt=l.effects.includes('(TXT) TYPEWRITER')?l.text.slice(0,Math.ceil(l.text.length*((activeLocalTime()%2)/2))):l.text;X.fillText(txt,0,0)} else {X.fillStyle=l.color;X.fillRect(-l.w/2,-l.h/2,l.w,l.h);X.strokeStyle=l.fill;X.lineWidth=3;X.strokeRect(-l.w/2,-l.h/2,l.w,l.h); if(l.type==='card'){X.fillStyle=l.fill;X.font='700 28px '+getComputedStyle(document.body).fontFamily;X.textAlign='center';X.fillText(l.name,0,8)}} if(l.effects.includes('SCANLINES')){X.globalAlpha*=.28;X.fillStyle='#000';for(let y=-l.h/2;y<l.h/2;y+=8)X.fillRect(-l.w/2,y,l.w,2)} if(l.effects.includes('INVERT')){X.globalCompositeOperation='difference';X.fillStyle='#fff';X.fillRect(-l.w/2,-l.h/2,l.w,l.h)} if(glitch){X.fillStyle='#efe9d9';X.fillRect(-l.w/2+Math.random()*12,-l.h/2+Math.random()*l.h,l.w,3)} X.restore()});}
function readFiles(files){[...files].forEach(f=>{if(f.type.startsWith('audio/'))return loadAudio(f);let url=URL.createObjectURL(f), el=f.type.startsWith('video/')?document.createElement('video'):new Image();let a={id:uid(),name:f.name,type:f.type,url,el};if(el.tagName==='VIDEO'){el.src=url;el.loop=true;el.muted=true;el.play().catch(()=>{})}else el.src=url;S.assets.push(a)});setTimeout(()=>{renderAssets();draw()},200)}
function renderAssets(){let b=$('assets');b.innerHTML='';S.assets.forEach(a=>{let d=document.createElement('div');d.className='asset';d.innerHTML='<canvas width="76" height="48"></canvas><div class="grow">'+esc(a.name)+'<div class="muted">'+a.type+'</div></div><button>SEL</button>';d.querySelector('button').onclick=()=>{S.selAsset=a.id;renderAssets()};if(a.id===S.selAsset)d.style.background='var(--ink)',d.style.color='var(--bg)';b.appendChild(d);let cx=d.querySelector('canvas').getContext('2d');setTimeout(()=>{try{cx.drawImage(a.el,0,0,76,48)}catch(e){}},100)})}
function assignAsset(){let l=sel();if(l&&S.selAsset){hist();l.asset=S.selAsset;draw();renderLayers()}}
function preset(p){hist();if(p==='clean'){S.layers=[defLayer('shape'),defLayer('text')];S.layers[0].w=620;S.layers[0].h=170;S.layers[1].text='CLEAN MOTION';S.layers[1].effects=['(TXT) FADE','(TXT) SLIDE']}if(p==='kinetic'){S.layers=[defLayer('text'),defLayer('text'),defLayer('text')];['FAST','RAW','SYSTEM'].forEach((t,i)=>{S.layers[i].text=t;S.layers[i].y=260+i*90;S.layers[i].font=68;S.layers[i].effects=['(TXT) SLIDE','SHAKE']})}if(p==='audio'){S.layers=[defLayer('shape'),defLayer('text')];S.layers[0].w=260;S.layers[0].h=260;S.layers[0].effects=['SCALE','DANCE'];S.layers[1].text='AUDIO SYNC';S.layers[1].y=560;S.audioMode='scale'}if(p==='poster'){S.layers=[];for(let i=0;i<6;i++){let l=defLayer('shape');l.x=260+i*150;l.y=220+(i%2)*160;l.w=120;l.h=120;l.effects=['ROTATION','FADE IN / OUT'];S.layers.push(l)}let t=defLayer('text');t.text='POSTER GRID';t.y=620;S.layers.push(t)}if(p==='glitch'){S.layers=[defLayer('text'),defLayer('shape')];S.layers[0].text='GLITCH';S.layers[0].font=100;S.layers[0].effects=['GLITCH','STROBE'];S.layers[1].w=900;S.layers[1].h=24;S.layers[1].effects=['SCANLINES','POSITION (X/Y)']}S.sel=0;renderUI();draw()}
function snapshot(){let url=C.toDataURL('image/png');S.snaps.push(url);let img=new Image();img.src=url;img.style.cssText='width:100%;border:1px solid var(--line);margin-bottom:5px';$('snaps').prepend(img)}
function exportHtml(){let data=JSON.stringify(cleanProject()).replace(/</g,'\\u003c');let html='<!doctype html><html><head><meta charset="utf-8"><title>DEMOFORGE EXPORT</title><style>html,body{margin:0;width:100%;height:100%;background:#000;overflow:hidden}canvas{width:100vw;height:100vh;display:block;object-fit:contain}</style></head><body><canvas id="c" width="1280" height="720"></canvas><script>const PROJECT='+data+';('+runtime.toString()+')();<\/script></body></html>';download('demoforge_fullscreen_export.html',html,'text/html')}
function runtime(){const C=document.getElementById('c'),X=C.getContext('2d'),W=1280,H=720,S=PROJECT;let t0=performance.now();function cl(v,a,b){return Math.max(a,Math.min(b,v))}function vals(l,t){let v={x:l.x,y:l.y,scale:l.scale,rot:l.rotation,op:l.opacity};let p=(t%3)/3;(l.effects||[]).forEach(f=>{if(f.includes('FADE'))v.op*=p<.5?p*2:(1-p)*2;if(f.includes('SLIDE')||f.includes('POSITION'))v.x+=-120+240*p;if(f==='ROTATION')v.rot+=360*p;if(f==='SHAKE'){v.x+=Math.sin(t*48)*8;v.y+=Math.cos(t*41)*6}if(f==='BOUNCE')v.y-=Math.abs(Math.sin(t*6))*40;if(f==='DANCE')v.x+=Math.sin(t*5)*30});return v}function loop(){let t=(performance.now()-t0)/1000;X.fillStyle='#111';X.fillRect(0,0,W,H);S.layers.forEach(l=>{if(!l.visible)return;let v=vals(l,t);X.save();X.translate(v.x,v.y);X.rotate(v.rot*Math.PI/180);X.scale(v.scale,v.scale);X.globalAlpha=cl(v.op,0,1);if(l.type==='text'){X.fillStyle=l.fill;X.textAlign='center';X.textBaseline='middle';X.font='700 '+l.font+'px ui-monospace,monospace';X.fillText(l.text,0,0)}else{X.fillStyle=l.color;X.fillRect(-l.w/2,-l.h/2,l.w,l.h);X.strokeStyle=l.fill;X.lineWidth=3;X.strokeRect(-l.w/2,-l.h/2,l.w,l.h)}X.restore()});requestAnimationFrame(loop)}loop()}
function download(name,content,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
renderWave();init();
})();
