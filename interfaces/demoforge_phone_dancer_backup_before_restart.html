<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DemoForge - Phone Dancer Background</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap');

:root{
  --bg:#050816;
  --bg-2:#0d1330;
  --cyan:#48f4ff;
  --teal:#0ff0c9;
  --lime:#a8ff60;
  --gold:#ffd36d;
  --pink:#ff4fd8;
  --violet:#7b61ff;
  --text:#edf5ff;
  --muted:rgba(237,245,255,.66);
  --panel:rgba(7,10,26,.42);
  --line:rgba(255,255,255,.08);
  --glow:0 0 24px rgba(72,244,255,.45),0 0 56px rgba(255,79,216,.22);
}

*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  overflow:hidden;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,79,216,.16), transparent 28%),
    radial-gradient(circle at 80% 10%, rgba(72,244,255,.14), transparent 26%),
    radial-gradient(circle at 50% 70%, rgba(123,97,255,.16), transparent 35%),
    linear-gradient(160deg, var(--bg) 0%, #060913 24%, var(--bg-2) 100%);
  color:var(--text);
  font-family:"Space Grotesk",sans-serif;
}

.scene{
  position:relative;
  width:100%;
  height:100%;
  isolation:isolate;
}

.aurora,
.grid,
.rings,
.noise,
.vignette,
.scanlines,
.stage,
.hero-wrap{
  position:absolute;
  inset:0;
}

.aurora{
  filter:blur(20px) saturate(120%);
  opacity:.9;
  z-index:0;
}

.aurora::before,
.aurora::after{
  content:"";
  position:absolute;
  width:42vw;
  height:42vw;
  border-radius:50%;
  mix-blend-mode:screen;
  animation:floatBlob 13s ease-in-out infinite;
}

.aurora::before{
  left:-8vw;
  top:4vh;
  background:radial-gradient(circle, rgba(255,79,216,.7) 0%, rgba(255,79,216,.18) 34%, transparent 66%);
}

.aurora::after{
  right:-6vw;
  bottom:4vh;
  animation-duration:16s;
  animation-direction:reverse;
  background:radial-gradient(circle, rgba(72,244,255,.72) 0%, rgba(72,244,255,.18) 34%, transparent 66%);
}

.grid{
  z-index:1;
  background:
    linear-gradient(rgba(255,255,255,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
  background-size:70px 70px;
  transform:perspective(1100px) rotateX(77deg) translateY(28vh) scale(1.7);
  transform-origin:center center;
  opacity:.18;
}

.rings{
  z-index:2;
  display:grid;
  place-items:center;
  pointer-events:none;
}

.rings::before,
.rings::after{
  content:"";
  width:65vmin;
  aspect-ratio:1;
  border-radius:50%;
  border:1px solid rgba(72,244,255,.16);
  box-shadow:0 0 28px rgba(72,244,255,.16), inset 0 0 28px rgba(72,244,255,.08);
  animation:pulseRing 5.2s ease-in-out infinite;
}

.rings::after{
  position:absolute;
  width:88vmin;
  border-color:rgba(255,79,216,.14);
  box-shadow:0 0 36px rgba(255,79,216,.16), inset 0 0 36px rgba(255,79,216,.06);
  animation-duration:7s;
  animation-delay:-1.1s;
}

#fx{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  z-index:3;
}

.stage{
  z-index:4;
  top:auto;
  height:34vh;
  background:
    linear-gradient(to top, rgba(0,0,0,.42), transparent 70%),
    radial-gradient(circle at 50% 15%, rgba(72,244,255,.18), transparent 34%),
    linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,0));
  border-top:1px solid rgba(255,255,255,.08);
  transform:translateY(3vh);
}

.stage::before{
  content:"";
  position:absolute;
  inset:auto 12% 12% 12%;
  height:16px;
  border-radius:999px;
  background:radial-gradient(circle, rgba(72,244,255,.4), rgba(255,79,216,.12), transparent 72%);
  filter:blur(12px);
}

.hero-wrap{
  z-index:5;
  display:grid;
  place-items:end center;
  padding-bottom:12vh;
}

.hero{
  position:relative;
  width:min(38vmin, 330px);
  aspect-ratio:1 / 1.45;
  filter:drop-shadow(0 30px 40px rgba(0,0,0,.62)) drop-shadow(0 0 22px rgba(72,244,255,.12));
}

.back-orb,
.silhouette-glow,
.silhouette-shadow{
  position:absolute;
  pointer-events:none;
}

.back-orb{
  left:50%;
  top:18%;
  width:82%;
  aspect-ratio:1;
  transform:translateX(-50%);
  background:radial-gradient(circle, rgba(72,244,255,.2), rgba(123,97,255,.08), transparent 68%);
  filter:blur(18px);
  animation:orbPulse 4.2s ease-in-out infinite;
}

.silhouette-glow{
  left:50%;
  top:16%;
  width:72%;
  height:74%;
  transform:translateX(-50%);
  background:radial-gradient(circle at 50% 42%, rgba(72,244,255,.09), rgba(255,79,216,.05) 42%, transparent 72%);
  filter:blur(28px);
}

.silhouette-shadow{
  left:50%;
  bottom:2%;
  width:72%;
  height:10%;
  transform:translateX(-50%);
  background:radial-gradient(circle, rgba(0,0,0,.6) 0%, rgba(0,0,0,.28) 48%, transparent 74%);
  filter:blur(14px);
  animation:shadowPulse 1.8s ease-in-out infinite;
}

.silhouette-svg{
  position:absolute;
  inset:0;
  overflow:visible;
}

.silhouette-svg .ink{
  fill:#02050b;
}

.silhouette-svg .phone-screen{
  fill:#02050b;
}

.silhouette-svg .soft-stroke{
  fill:none;
  stroke:rgba(90,240,255,.08);
  stroke-width:3;
  filter:blur(3px);
}

.dancer{
  transform-origin:50% 90%;
  animation:dancerGroove 2.15s cubic-bezier(.42,0,.2,1) infinite;
}

.head-unit,
.arm-left,
.arm-right,
.phone-unit,
.leg-left,
.leg-right{
  transform-box:fill-box;
}

.head-unit{
  transform-origin:64% 92%;
  animation:headDip 2.15s ease-in-out infinite;
}

.arm-left{
  transform-origin:84% 10%;
  animation:armFreeGroove 2.15s ease-in-out infinite;
}

.arm-right{
  transform-origin:14% 10%;
  animation:armPhoneGroove 2.15s ease-in-out infinite;
}

.phone-unit{
  transform-origin:48% 50%;
  animation:phoneCheck 2.15s ease-in-out infinite;
}

.leg-left{
  transform-origin:68% 8%;
  animation:legBackBeat 2.15s ease-in-out infinite;
}

.leg-right{
  transform-origin:34% 8%;
  animation:legFrontBeat 2.15s ease-in-out infinite;
}

.noise,
.scanlines,
.vignette{
  pointer-events:none;
}

.noise{
  z-index:8;
  opacity:.08;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,.85) .7px, transparent .8px),
    radial-gradient(circle at 60% 80%, rgba(255,255,255,.75) .7px, transparent .8px),
    radial-gradient(circle at 30% 70%, rgba(255,255,255,.45) .7px, transparent .8px),
    radial-gradient(circle at 70% 20%, rgba(255,255,255,.65) .7px, transparent .8px);
  background-size:14px 14px, 17px 17px, 19px 19px, 23px 23px;
  mix-blend-mode:soft-light;
}

.scanlines{
  z-index:9;
  background:repeating-linear-gradient(180deg, rgba(255,255,255,.03) 0 1px, transparent 1px 4px);
  opacity:.18;
}

.vignette{
  z-index:10;
  box-shadow:inset 0 0 220px rgba(0,0,0,.5);
}

@keyframes floatBlob{
  0%,100%{transform:translate3d(0,0,0) scale(1)}
  33%{transform:translate3d(7vw,4vh,0) scale(1.08)}
  66%{transform:translate3d(-3vw,8vh,0) scale(.94)}
}

@keyframes pulseRing{
  0%,100%{transform:scale(.95);opacity:.55}
  50%{transform:scale(1.05);opacity:.95}
}

@keyframes dancerGroove{
  0%,100%{transform:translateY(0) rotate(-1.1deg)}
  25%{transform:translateY(-1.4%) rotate(.9deg)}
  50%{transform:translateY(-4.5%) rotate(-2.6deg)}
  75%{transform:translateY(-1.3%) rotate(1.6deg)}
}

@keyframes headDip{
  0%,100%{transform:rotate(-9deg)}
  30%{transform:rotate(-4deg)}
  50%{transform:rotate(-15deg)}
  80%{transform:rotate(-7deg)}
}

@keyframes armFreeGroove{
  0%,100%{transform:rotate(2deg)}
  50%{transform:rotate(19deg) translateY(-3%)}
}

@keyframes armPhoneGroove{
  0%,100%{transform:rotate(-8deg)}
  50%{transform:rotate(-18deg) translateY(-2%)}
}

@keyframes phoneCheck{
  0%,100%{transform:rotate(-10deg) translateY(0)}
  50%{transform:rotate(-1deg) translateY(-3%)}
}

@keyframes legBackBeat{
  0%,100%{transform:rotate(10deg)}
  50%{transform:rotate(-13deg)}
}

@keyframes legFrontBeat{
  0%,100%{transform:rotate(-10deg)}
  50%{transform:rotate(15deg)}
}

@keyframes shadowPulse{
  0%,100%{transform:translateX(-50%) scaleX(1);opacity:.56}
  50%{transform:translateX(-50%) scaleX(.9);opacity:.38}
}

@keyframes orbPulse{
  0%,100%{opacity:.5;transform:translateX(-50%) scale(.96)}
  50%{opacity:.85;transform:translateX(-50%) scale(1.06)}
}

@media (max-width: 900px){
  .hero-wrap{padding-bottom:14vh}
  .hero{width:min(52vmin, 320px)}
}
</style>
</head>
<body>
<main class="scene">
  <div class="aurora"></div>
  <div class="grid"></div>
  <div class="rings"></div>
  <canvas id="fx"></canvas>

  <div class="hero-wrap">
    <div class="hero" aria-hidden="true">
      <div class="back-orb"></div>
      <div class="silhouette-glow"></div>
      <div class="silhouette-shadow"></div>
      <svg class="silhouette-svg" viewBox="0 0 320 560" role="img" aria-label="Silhouette dansante regardant son téléphone">
        <g class="dancer">
          <g class="leg-left">
            <path class="ink" d="M180 302C194 314 204 333 209 360C215 392 213 427 204 470C200 489 197 512 199 538L177 539C174 517 174 494 176 470C177 442 174 418 164 383C157 357 157 327 180 302Z"/>
          </g>
          <g class="leg-right">
            <path class="ink" d="M156 302C167 315 171 334 167 359C162 391 150 419 132 452C121 472 114 501 114 538H92C91 505 97 476 108 449C119 421 127 391 129 358C131 331 139 313 156 302Z"/>
          </g>
          <g class="body-core">
            <path class="ink" d="M148 114C160 103 179 101 193 113C208 126 213 146 212 165C212 182 218 197 230 212C243 229 249 250 248 276C247 295 238 309 222 320C208 329 190 333 170 333C148 333 130 329 117 320C101 309 93 295 94 275C95 248 107 224 123 204C137 187 144 171 144 154C144 138 138 123 148 114Z"/>
            <path class="ink" d="M163 326C183 330 200 326 214 318C220 341 218 365 210 389C204 408 196 427 191 447H154C156 427 155 407 151 389C147 369 148 345 163 326Z"/>
            <path class="ink" d="M155 171C174 186 195 196 219 201L208 227C188 223 169 216 149 203Z"/>
          </g>
          <g class="head-unit">
            <path class="ink" d="M145 77C149 54 166 41 186 43C208 45 224 63 224 88C224 113 206 131 181 131C155 131 137 112 139 87C140 84 141 80 145 77Z"/>
            <path class="ink" d="M143 79C151 53 171 38 191 40C210 42 228 58 230 84C220 80 211 74 202 63C198 75 189 87 173 96C161 103 150 106 140 105C139 96 139 87 143 79Z"/>
          </g>
          <g class="arm-left">
            <path class="ink" d="M121 208C106 220 95 238 91 260C89 275 92 289 101 299C109 307 121 303 125 292C129 282 127 271 125 258C122 241 123 224 132 211Z"/>
          </g>
          <g class="arm-right">
            <path class="ink" d="M214 191C233 197 249 209 259 228C267 244 269 260 263 275C258 285 246 288 238 281C232 275 230 265 230 253C229 237 224 223 211 207Z"/>
          </g>
          <g class="phone-unit">
            <rect class="phone-screen" x="244" y="245" width="18" height="36" rx="4"/>
          </g>
          <path class="soft-stroke" d="M247 249C238 226 225 211 209 198"/>
        </g>
      </svg>
    </div>
  </div>

  <div class="stage"></div>
  <div class="noise"></div>
  <div class="scanlines"></div>
  <div class="vignette"></div>
</main>

<script>
const canvas = document.getElementById("fx");
const ctx = canvas.getContext("2d");
const particleCount = 110;
const particles = [];
let w = 0;
let h = 0;
let time = 0;

function resize(){
  w = canvas.width = window.innerWidth * Math.min(window.devicePixelRatio, 2);
  h = canvas.height = window.innerHeight * Math.min(window.devicePixelRatio, 2);
  canvas.style.width = `${window.innerWidth}px`;
  canvas.style.height = `${window.innerHeight}px`;
  particles.length = 0;

  for(let i = 0; i < particleCount; i++){
    particles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      r: (Math.random() * 2.2 + 0.6) * Math.min(window.devicePixelRatio, 2),
      speed: (Math.random() * 0.5 + 0.15) * Math.min(window.devicePixelRatio, 2),
      drift: (Math.random() - 0.5) * 0.55,
      hue: Math.random() > 0.5 ? 190 : 315,
      alpha: Math.random() * 0.5 + 0.12
    });
  }
}

function drawBackdrop(t){
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0, "rgba(7, 12, 30, 0.10)");
  grad.addColorStop(1, "rgba(2, 4, 10, 0.34)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  const waveY = h * 0.55;
  ctx.beginPath();
  ctx.moveTo(0, waveY);
  for(let x = 0; x <= w; x += w / 14){
    const y = waveY + Math.sin((x / w) * Math.PI * 4 + t * 1.7) * h * 0.028;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(w, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  const glow = ctx.createLinearGradient(0, waveY - h * 0.1, 0, h);
  glow.addColorStop(0, "rgba(72, 244, 255, 0.08)");
  glow.addColorStop(.6, "rgba(123, 97, 255, 0.05)");
  glow.addColorStop(1, "rgba(255, 79, 216, 0.10)");
  ctx.fillStyle = glow;
  ctx.fill();
}

function drawParticles(t){
  particles.forEach((p, i) => {
    p.y -= p.speed;
    p.x += Math.sin(t * 0.8 + i) * 0.12 + p.drift;

    if(p.y < -10){
      p.y = h + 10;
      p.x = Math.random() * w;
    }
    if(p.x < -20) p.x = w + 20;
    if(p.x > w + 20) p.x = -20;

    const flicker = .7 + Math.sin(t * 3 + i) * .3;
    ctx.beginPath();
    ctx.fillStyle = `hsla(${p.hue}, 100%, 72%, ${p.alpha * flicker})`;
    ctx.shadowBlur = 14 * flicker;
    ctx.shadowColor = p.hue === 190 ? "rgba(72,244,255,.9)" : "rgba(255,79,216,.9)";
    ctx.arc(p.x, p.y, p.r * flicker, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.shadowBlur = 0;
}

function drawBeams(t){
  const centerX = w * 0.5;
  const centerY = h * 0.43;
  for(let i = 0; i < 6; i++){
    const angle = -0.8 + i * 0.32 + Math.sin(t * 0.9 + i) * 0.06;
    const len = h * (0.34 + i * 0.03);
    ctx.save();
    ctx.translate(centerX, centerY);
    ctx.rotate(angle);
    const beam = ctx.createLinearGradient(0, 0, 0, len);
    beam.addColorStop(0, i % 2 ? "rgba(255,79,216,.16)" : "rgba(72,244,255,.18)");
    beam.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = beam;
    ctx.beginPath();
    ctx.moveTo(-10, 0);
    ctx.lineTo(10, 0);
    ctx.lineTo(60, len);
    ctx.lineTo(-60, len);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

function render(now){
  time = now * 0.001;
  ctx.clearRect(0, 0, w, h);
  drawBackdrop(time);
  drawBeams(time);
  drawParticles(time);
  requestAnimationFrame(render);
}

window.addEventListener("resize", resize);
resize();
requestAnimationFrame(render);
</script>
</body>
</html>
