<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Demoforge Optimized Fullscreen</title>
<style>
:root{--bg:#0c0c0a;--panel:#ebe4d1;--ink:#191919;--muted:#5d5a4d;--line:#191919;--accent:#77772b;--warn:#8a2a1d;--ok:#245f25;--uiw:320px;--timeline-h:96px;--mono:ui-monospace,Menlo,Consolas,monospace}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:var(--mono);font-size:12px;color:var(--ink)}button,input,select,textarea{font:inherit}button{border:1px solid var(--line);background:#f3ecd9;color:var(--ink);padding:7px 9px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer}button:hover{background:var(--ink);color:#f3ecd9}button.primary{background:var(--ink);color:#f3ecd9}button.warn{color:var(--warn)}select,input[type=text],textarea{width:100%;border:1px solid var(--line);background:#f6efdc;color:var(--ink);padding:6px}label{display:block;margin:9px 0 4px;color:var(--muted);text-transform:lowercase}.app{position:fixed;inset:0;display:grid;grid-template-columns:var(--uiw) 1fr;grid-template-rows:1fr var(--timeline-h)}aside{grid-row:1/3;background:var(--panel);border-right:1px solid var(--line);padding:16px;overflow:auto}main{position:relative;grid-column:2;grid-row:1;background:#000}.timeline{grid-column:2;grid-row:2;background:var(--panel);border-top:1px solid var(--line);padding:14px 22px}.brand{font-weight:700;letter-spacing:.25em;text-transform:uppercase;margin-bottom:2px}.sub{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:18px}.block{border-top:1px solid var(--line);padding:12px 0}.block:first-child{border-top:0}.block h2{font-size:10px;margin:0 0 9px;letter-spacing:.22em;text-transform:uppercase}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}.row{display:flex;gap:6px;align-items:center}.row>*{flex:1}.small{font-size:10px;padding:5px 6px}.canvas-wrap{position:absolute;inset:0;display:grid;place-items:center}.fit-box{width:min(100%,calc((100vh - var(--timeline-h))*4/3));max-width:100%;aspect-ratio:4/3;position:relative;background:#050505;border:1px solid rgba(255,255,255,.15)}#srcVideo,#srcGif{display:none;position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:.18;pointer-events:none}#render{position:absolute;inset:0;width:100%;height:100%}.full #render{position:fixed;inset:0;width:100vw!important;height:100vh!important}.drop{position:fixed;inset:0;z-index:20;display:none;place-items:center;background:rgba(235,228,209,.82);border:3px dashed var(--accent);font-size:24px;letter-spacing:.22em;text-transform:uppercase}.drop.show{display:grid}.bar{position:relative;width:min(100%,calc((100vh - var(--timeline-h))*4/3));height:36px;background:#f6efdc;border:1px solid var(--line);margin:auto;cursor:pointer}.sel{position:absolute;top:0;bottom:0;background:rgba(119,119,43,.35);cursor:grab}.head{position:absolute;top:-7px;width:14px;height:48px;background:var(--ink);border:2px solid var(--panel);cursor:ew-resize;z-index:3}.head:after{position:absolute;top:-15px;left:-6px;color:var(--accent);font-size:10px}.head.in:after{content:'IN'}.head.out:after{content:'OUT'}.playhead{position:absolute;top:-5px;bottom:-5px;width:2px;background:var(--warn);pointer-events:none}.time{width:min(100%,calc((100vh - var(--timeline-h))*4/3));margin:8px auto 0;display:flex;justify-content:space-between;color:var(--muted)}#status{white-space:pre-wrap;min-height:42px;border:1px solid var(--line);background:#f6efdc;padding:8px}.ok{color:var(--ok)}.bad{color:var(--warn)}.hidden{display:none!important}@media(max-width:900px){.app{grid-template-columns:1fr;grid-template-rows:auto 1fr var(--timeline-h)}aside{grid-column:1;grid-row:1;max-height:42vh;border-right:0;border-bottom:1px solid var(--line)}main{grid-column:1;grid-row:2}.timeline{grid-column:1;grid-row:3}.fit-box,.bar,.time{width:100%}}
</style>
</head>
<body>
<div class="drop" id="drop">Déposez ici</div>
<div class="app">
<aside>
  <div class="brand">Demoforge</div><div class="sub">optimized fullscreen</div>
  <section class="block"><h2>Source</h2><input id="file" type="file" accept="video/*,image/gif"><label>url youtube / id</label><input id="yt" type="text" placeholder="https://youtube.com/watch?v=..."><div class="grid2" style="margin-top:6px"><button id="loadYt">Charger</button><button id="reset">Reset</button></div></section>
  <section class="block"><h2>Rendu</h2><label>Effet</label><select id="effect"><option value="silhouette">Silhouette</option><option value="ascii">ASCII</option><option value="pixel">Pixel</option><option value="matrix">Matrix</option><option value="custom">Module JSON</option></select><label>Preset</label><select id="preset"><option value="paper">Paper olive</option><option value="green">Terminal green</option><option value="amber">CRT amber</option><option value="ice">Ice cyan</option><option value="mono">Mono hard</option></select><label>Raster</label><select id="raster"><option value="none">none</option><option value="scanlines">scanlines</option><option value="grid">grid</option><option value="dots">dots</option><option value="diagonal">diagonal</option><option value="checker">checker</option></select></section>
  <section class="block"><h2>Couleurs</h2><div class="grid2"><label>fond<input id="cBg" type="color" value="#efe9d9"></label><label>encre<input id="cInk" type="color" value="#1a1a1a"></label><label>accent<input id="cAccent" type="color" value="#77772b"></label><label>halo<input id="cHalo" type="color" value="#b8b36b"></label></div></section>
  <section class="block"><h2>Réglages</h2><label>taille <span id="vSize">42</span></label><input id="size" type="range" min="4" max="100" value="42"><label>contraste <span id="vContrast">120</span></label><input id="contrast" type="range" min="40" max="220" value="120"><label>motion <span id="vMotion">45</span></label><input id="motion" type="range" min="0" max="100" value="45"><label>caractères</label><textarea id="chars" rows="2"> .:-=+*#%@</textarea></section>
  <section class="block"><h2>Export</h2><div class="grid2"><button class="primary" id="xLite">HTML léger</button><button id="xAnim">HTML animé</button><button id="xPng">PNG</button><button id="xSvg">SVG</button><button id="xCfg">Config</button><button id="iCfgBtn">Importer</button></div><input id="iCfg" class="hidden" type="file" accept="application/json,.json"></section>
  <section class="block"><h2>Module JSON</h2><textarea id="module" rows="6" placeholder='{"effectCode":"ctx.fillStyle=pal.ink;ctx.fillRect(20,20,100,100);"}'></textarea><button id="applyModule" style="width:100%;margin-top:6px">Appliquer module</button></section>
  <section class="block"><h2>État</h2><div id="status">prêt.</div></section>
</aside>
<main><div class="canvas-wrap"><div class="fit-box" id="fit"><video id="srcVideo" muted playsinline crossorigin="anonymous"></video><img id="srcGif" alt=""><canvas id="render"></canvas></div></div></main>
<div class="timeline"><div class="bar" id="bar"><div class="sel" id="sel"></div><div class="head in" id="hIn"></div><div class="head out" id="hOut"></div><div class="playhead" id="ph"></div></div><div class="time"><span>IN <b id="tIn">00:00.000</b></span><span>CUR <b id="tCur">00:00.000</b></span><span>OUT <b id="tOut">00:00.000</b></span></div></div>
</div>
<canvas id="work" class="hidden"></canvas><canvas id="prev" class="hidden"></canvas>
<script>
(()=>{'use strict';
const $=id=>document.getElementById(id),C={paper:{bg:'#efe9d9',ink:'#1a1a1a',accent:'#77772b',halo:'#b8b36b'},green:{bg:'#001806',ink:'#33ff66',accent:'#9fffa6',halo:'#1a8a3a'},amber:{bg:'#1a0d00',ink:'#ffb347',accent:'#ffd280',halo:'#b76a16'},ice:{bg:'#eaf4fa',ink:'#08364a',accent:'#3aa6c4',halo:'#a8d8e8'},mono:{bg:'#f7f0df',ink:'#111111',accent:'#555555',halo:'#bbbbbb'}};
const st={type:'none',total:5,in:0,out:5,effect:'silhouette',raster:'none',pal:{...C.paper},size:42,contrast:120,motion:45,chars:' .:-=+*#%@',custom:null,drag:null};
const render=$('render'),ctx=render.getContext('2d'),work=$('work'),wctx=work.getContext('2d',{willReadFrequently:true}),prev=$('prev'),pctx=prev.getContext('2d',{willReadFrequently:true}),video=$('srcVideo'),gif=$('srcGif');
const WW=160,WH=120; work.width=prev.width=WW; work.height=prev.height=WH;
function status(s,k){$('status').innerHTML='<span class="'+(k==='bad'?'bad':k==='ok'?'ok':'')+'">'+esc(s)+'</span>'}function esc(s){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function fmt(t){t=Math.max(0,t||0);let m=Math.floor(t/60),s=Math.floor(t%60),ms=Math.floor((t%1)*1000);return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(ms).padStart(3,'0')}function clamp(x,a,b){return Math.max(a,Math.min(b,x))}
function resize(){const r=$('fit').getBoundingClientRect(),d=window.devicePixelRatio||1;render.width=Math.max(2,Math.floor(r.width*d));render.height=Math.max(2,Math.floor(r.height*d));ctx.setTransform(d,0,0,d,0,0)}addEventListener('resize',resize);setTimeout(resize,0);
function syncUI(){$('tIn').textContent=fmt(st.in);$('tOut').textContent=fmt(st.out);let a=100*st.in/(st.total||1),b=100*st.out/(st.total||1);$('hIn').style.left=`calc(${a}% - 7px)`;$('hOut').style.left=`calc(${b}% - 7px)`;$('sel').style.left=a+'%';$('sel').style.width=Math.max(0,b-a)+'%';['size','contrast','motion'].forEach(k=>{$('v'+k[0].toUpperCase()+k.slice(1)).textContent=st[k]});}
function applyPalette(p){st.pal={...C[p]};$('cBg').value=st.pal.bg;$('cInk').value=st.pal.ink;$('cAccent').value=st.pal.accent;$('cHalo').value=st.pal.halo}
$('preset').onchange=e=>applyPalette(e.target.value);['cBg','cInk','cAccent','cHalo'].forEach((id,i)=>$(id).oninput=e=>{['bg','ink','accent','halo'][i]&&(st.pal[['bg','ink','accent','halo'][i]]=e.target.value)});['size','contrast','motion'].forEach(k=>$(k).oninput=e=>{st[k]=+e.target.value;syncUI()});$('effect').onchange=e=>st.effect=e.target.value;$('raster').onchange=e=>st.raster=e.target.value;$('chars').oninput=e=>st.chars=e.target.value||' .:-=+*#%@';
function reset(){try{video.pause()}catch(e){} video.removeAttribute('src');gif.removeAttribute('src');video.style.display=gif.style.display='none';st.type='none';st.total=5;st.in=0;st.out=5;syncUI();status('source réinitialisée.')} $('reset').onclick=reset;
function loadFile(f){reset();const u=URL.createObjectURL(f);if(f.type==='image/gif'||/\.gif$/i.test(f.name)){gif.src=u;gif.style.display='block';st.type='gif';st.total=5;st.out=5;status('GIF chargé.','ok')}else{video.src=u;video.style.display='block';st.type='video';video.onloadedmetadata=()=>{st.total=video.duration||5;st.in=0;st.out=st.total;syncUI();video.play().catch(()=>{});status('vidéo chargée.','ok')};}}$('file').onchange=e=>e.target.files[0]&&loadFile(e.target.files[0]);
function ytId(s){s=String(s||'').trim();let m=s.match(/(?:v=|youtu\.be\/|shorts\/|embed\/)([\w-]{11})/)||s.match(/^([\w-]{11})$/);return m&&m[1]}$('loadYt').onclick=()=>{let id=ytId($('yt').value);if(!id)return status('URL YouTube invalide.','bad');reset();gif.src='https://img.youtube.com/vi/'+id+'/hqdefault.jpg';gif.style.display='block';st.type='gif';status('miniature YouTube chargée en mode image statique.','ok')};
let depth=0;function show(e){e.preventDefault();depth++;$('drop').classList.add('show')}function over(e){e.preventDefault()}function leave(e){e.preventDefault();depth=Math.max(0,depth-1);if(!depth)$('drop').classList.remove('show')}function drop(e){e.preventDefault();depth=0;$('drop').classList.remove('show');let dt=e.dataTransfer;if(dt.files&&dt.files[0])loadFile(dt.files[0]);else{let t=dt.getData('text/uri-list')||dt.getData('text/plain');$('yt').value=t;$('loadYt').click()}}['dragenter'].forEach(x=>document.addEventListener(x,show,true));document.addEventListener('dragover',over,true);document.addEventListener('dragleave',leave,true);document.addEventListener('drop',drop,true);
function barPct(e){let r=$('bar').getBoundingClientRect();return clamp((e.clientX-r.left)/r.width,0,1)}function begin(which,e){st.drag=which;e.preventDefault()}$('hIn').onpointerdown=e=>begin('in',e);$('hOut').onpointerdown=e=>begin('out',e);$('sel').onpointerdown=e=>{st.drag={kind:'range',x:barPct(e),a:st.in,b:st.out};e.preventDefault()};$('bar').onpointerdown=e=>{if(e.target!==$('bar'))return;let p=barPct(e)*(st.total||1);if(Math.abs(p-st.in)<Math.abs(p-st.out))st.in=clamp(p,0,st.out-.05);else st.out=clamp(p,st.in+.05,st.total);syncUI()};addEventListener('pointermove',e=>{if(!st.drag)return;let p=barPct(e),t=p*(st.total||1);if(st.drag==='in')st.in=clamp(t,0,st.out-.05);else if(st.drag==='out')st.out=clamp(t,st.in+.05,st.total);else{let dur=st.drag.b-st.drag.a,nt=clamp(t-st.drag.x*(st.total||1)+st.drag.a,0,Math.max(0,st.total-dur));st.in=nt;st.out=nt+dur}syncUI()});addEventListener('pointerup',()=>st.drag=null);
function frame(){wctx.fillStyle='#000';wctx.fillRect(0,0,WW,WH);try{if(st.type==='video'&&video.readyState>=2){wctx.drawImage(video,0,0,WW,WH);return true}if(st.type==='gif'&&gif.complete&&gif.naturalWidth){wctx.drawImage(gif,0,0,WW,WH);return true}}catch(e){}return false}
function mask(){let id=wctx.getImageData(0,0,WW,WH),pd=pctx.getImageData(0,0,WW,WH),m=new Uint8Array(WW*WH),th=8+(1-st.motion/100)*80,sum=0;for(let i=0;i<m.length;i++){let j=i*4,l=id.data[j]*.299+id.data[j+1]*.587+id.data[j+2]*.114,pl=pd.data[j]*.299+pd.data[j+1]*.587+pd.data[j+2]*.114,d=Math.abs(l-pl);if(d>th){m[i]=255;sum++}}if(sum/m.length<.015){for(let i=0;i<m.length;i++){let j=i*4,l=id.data[j]*.299+id.data[j+1]*.587+id.data[j+2]*.114;if(l<115)m[i]=220}}pctx.drawImage(work,0,0);return{id,m}}
function clear(){ctx.fillStyle=st.pal.bg;ctx.fillRect(0,0,render.clientWidth,render.clientHeight)}function rgba(hex,a){let n=parseInt(hex.slice(1),16);return`rgba(${n>>16&255},${n>>8&255},${n&255},${a})`}
function drawRaster(){let W=render.clientWidth,H=render.clientHeight,p=Math.max(4,Math.round(st.size/3));ctx.save();ctx.strokeStyle=rgba(st.pal.ink,.35);ctx.fillStyle=rgba(st.pal.ink,.35);if(st.raster==='scanlines')for(let y=0;y<H;y+=p)ctx.fillRect(0,y,W,1);if(st.raster==='grid'){for(let y=0;y<H;y+=p){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}for(let x=0;x<W;x+=p){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}}if(st.raster==='dots')for(let y=0;y<H;y+=p)for(let x=0;x<W;x+=p){ctx.beginPath();ctx.arc(x,y,1.5,0,7);ctx.fill()}if(st.raster==='diagonal')for(let x=-H;x<W;x+=p){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x+H,H);ctx.stroke()}if(st.raster==='checker')for(let y=0;y<H;y+=p)for(let x=0;x<W;x+=p)if(((x/p|0)+(y/p|0))%2)ctx.fillRect(x,y,p,p);ctx.restore()}
function silhouette(id,m){clear();let W=render.clientWidth,H=render.clientHeight,cw=W/WW,ch=H/WH,step=Math.max(1,Math.round(st.size/18));ctx.fillStyle=st.pal.ink;for(let y=0;y<WH;y+=step)for(let x=0;x<WW;x+=step)if(m[y*WW+x]>120)ctx.fillRect(x*cw,y*ch,Math.ceil(step*cw),Math.ceil(step*ch));}
function ascii(id,m){clear();let W=render.clientWidth,H=render.clientHeight,cell=Math.max(6,st.size/2),cols=W/cell|0,rows=H/cell|0,ch=st.chars;ctx.fillStyle=st.pal.ink;ctx.font='bold '+cell+'px monospace';ctx.textBaseline='top';for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){let sx=Math.min(WW-1,(x/cols*WW)|0),sy=Math.min(WH-1,(y/rows*WH)|0),j=(sy*WW+sx)*4,l=(id.data[j]*.299+id.data[j+1]*.587+id.data[j+2]*.114)/255;l=clamp((l-.5)*(st.contrast/100)+.5,0,1);let k=Math.floor((1-l)*(ch.length-1));if(m[sy*WW+sx]>80)k=ch.length-1;let c=ch[k];if(c!==' ')ctx.fillText(c,x*cell,y*cell)}}
function pixel(id){clear();let W=render.clientWidth,H=render.clientHeight,cw=W/WW,ch=H/WH,step=Math.max(1,Math.round(st.size/16));for(let y=0;y<WH;y+=step)for(let x=0;x<WW;x+=step){let j=(y*WW+x)*4,l=(id.data[j]*.299+id.data[j+1]*.587+id.data[j+2]*.114)/255;ctx.fillStyle=l>.5?st.pal.bg:st.pal.ink;ctx.fillRect(x*cw,y*ch,Math.ceil(step*cw),Math.ceil(step*ch))}}
let drops;function matrix(){let W=render.clientWidth,H=render.clientHeight,cell=Math.max(8,st.size/2);if(!drops||drops.length!==Math.ceil(W/cell))drops=Array.from({length:Math.ceil(W/cell)},()=>Math.random()*H/cell);ctx.fillStyle='rgba(0,0,0,.18)';ctx.fillRect(0,0,W,H);ctx.fillStyle=st.pal.ink;ctx.font=cell+'px monospace';for(let i=0;i<drops.length;i++){ctx.fillText(st.chars[(Math.random()*st.chars.length)|0]||'0',i*cell,drops[i]*cell);drops[i]=(drops[i]+.35)%Math.ceil(H/cell)}}
function renderLoop(){resize();let ok=frame(),pack=ok?mask():null;if(st.type==='video'){if(video.currentTime<st.in&&!video.paused)video.currentTime=st.in;if(video.currentTime>=st.out&&!video.paused)video.currentTime=st.in;$('tCur').textContent=fmt(video.currentTime);$('ph').style.left=(100*(video.currentTime/(st.total||1)))+'%'}else{$('tCur').textContent=fmt(((performance.now()/1000)%st.total));$('ph').style.left=(100*(((performance.now()/1000)%st.total)/(st.total||1)))+'%'}try{if(st.effect==='matrix')matrix();else if(st.effect==='ascii'&&pack)ascii(pack.id,pack.m);else if(st.effect==='pixel'&&pack)pixel(pack.id,pack.m);else if(st.effect==='custom'&&st.custom)st.custom({ctx,canvas:render,work,wctx,state:st,pal:st.pal,clear,rgba,clamp});else if(pack)silhouette(pack.id,pack.m);else{clear();ctx.fillStyle=st.pal.ink;ctx.textAlign='center';ctx.fillText('déposez une vidéo ou un GIF',render.clientWidth/2,render.clientHeight/2)}}catch(e){status('erreur rendu : '+e.message,'bad')}drawRaster();requestAnimationFrame(renderLoop)}
function dl(content,name,type='text/plain'){let b=content instanceof Blob?content:new Blob([content],{type}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
function snapshot(mime='image/webp',q=.82,max=960){let s=Math.min(1,max/render.width),c=document.createElement('canvas');c.width=Math.max(1,render.width*s|0);c.height=Math.max(1,render.height*s|0);c.getContext('2d').drawImage(render,0,0,c.width,c.height);return c.toDataURL(mime,q)}
$('xLite').onclick=()=>{let d=snapshot('image/webp',.72,900),html='<!doctype html><meta name="viewport" content="width=device-width,initial-scale=1"><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:'+st.pal.bg+'}img{position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover}</style><img src="'+d+'">';dl(html,'demoforge_fullscreen_lite.html','text/html');status('HTML léger fullscreen exporté.','ok')};
$('xPng').onclick=()=>render.toBlob(b=>b&&dl(b,'demoforge_frame.png','image/png'),'image/png');$('xSvg').onclick=()=>{let d=snapshot('image/webp',.75,960),svg='<svg xmlns="http://www.w3.org/2000/svg" width="100vw" height="100vh" viewBox="0 0 '+render.width+' '+render.height+'"><image href="'+d+'" width="'+render.width+'" height="'+render.height+'" preserveAspectRatio="xMidYMid slice"/></svg>';dl(svg,'demoforge_fullscreen.svg','image/svg+xml')};
async function collect(){let n=36,fps=8,arr=[];if(st.type==='video')video.pause();for(let i=0;i<n;i++){if(st.type==='video'){video.currentTime=st.in+(st.out-st.in)*i/n;await new Promise(r=>setTimeout(r,70))}await new Promise(r=>requestAnimationFrame(r));arr.push(snapshot('image/webp',.5,480))}return{arr,fps}}$('xAnim').onclick=async()=>{try{status('capture animation…');let p=await collect(),html='<!doctype html><meta name="viewport" content="width=device-width,initial-scale=1"><style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:'+st.pal.bg+'}img{position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover}</style><img id=f><script>const F='+JSON.stringify(p.arr).replace(/</g,'\\u003c')+';let i=0,f=document.getElementById("f");function t(){f.src=F[i++%F.length]}t();setInterval(t,'+Math.round(1000/p.fps)+')<\/script>';dl(html,'demoforge_fullscreen_animated.html','text/html');status('HTML animé fullscreen exporté.','ok')}catch(e){status('export animé impossible : '+e.message,'bad')}};
function config(){return{in:st.in,out:st.out,effect:st.effect,raster:st.raster,pal:st.pal,size:st.size,contrast:st.contrast,motion:st.motion,chars:st.chars}}$('xCfg').onclick=()=>dl(JSON.stringify(config(),null,2),'demoforge_config.json','application/json');$('iCfgBtn').onclick=()=>$('iCfg').click();$('iCfg').onchange=async e=>{let f=e.target.files[0];if(!f)return;try{let c=JSON.parse(await f.text());Object.assign(st,c);['size','contrast','motion'].forEach(k=>$(k).value=st[k]);$('effect').value=st.effect;$('raster').value=st.raster;$('chars').value=st.chars;['Bg','Ink','Accent','Halo'].forEach((n,i)=>$(('c'+n)).value=st.pal[['bg','ink','accent','halo'][i]]);syncUI();status('config chargée.','ok')}catch(err){status('config invalide : '+err.message,'bad')}};
$('applyModule').onclick=()=>{try{let m=JSON.parse($('module').value);if(!m.effectCode)throw Error('effectCode manquant');st.custom=new Function('api','with(api){'+m.effectCode+'}');$('effect').value='custom';st.effect='custom';status('module appliqué. Code local uniquement.','ok')}catch(e){status('module refusé : '+e.message,'bad')}};
applyPalette('paper');syncUI();renderLoop();
})();
</script>
