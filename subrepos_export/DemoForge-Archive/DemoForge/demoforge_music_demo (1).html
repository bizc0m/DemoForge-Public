    function starfield(){const count=Math.min(stars.length,Number(CFG.starsCount)||0);for(let i=0;i<count;i++){const s=stars[i];s.y+=.18*s.z;s.x+=Math.sin(t*.012+s.y*.03)*.05;if(s.y>H){s.y=0;s.x=Math.random()*W}g.fillStyle=s.z>1.55?"#fff":s.z>.9?"#7dd3fc":"#7c3aed";g.fillRect(s.x,s.y,s.s,s.s)}}
    function grid(){const horizon=168;g.strokeStyle="rgba(0,229,255,.34)";g.lineWidth=1;for(let i=0;i<16;i++){const y=horizon+i*i*.54;g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.stroke()}for(let i=-14;i<=14;i++){const x=W/2+i*18;g.beginPath();g.moveTo(W/2,horizon);g.lineTo(x,H);g.stroke()}}
    function bars(){const count=Number(CFG.barCount),speed=Number(CFG.barSpeed)/10,amp=Number(CFG.barAmp),h=Number(CFG.barHeight),minY=Number(CFG.barMinY),maxY=Number(CFG.barMaxY),span=Math.max(1,maxY-minY);for(let i=0;i<count;i++){const base=minY+(i/(Math.max(1,count-1)))*span,y=Math.max(minY,Math.min(maxY-h,base+Math.sin(t*.035*speed+i*.7)*amp)),grad=g.createLinearGradient(40,y,W-40,y);grad.addColorStop(0,CFG.barA);grad.addColorStop(.5,CFG.barB);grad.addColorStop(1,CFG.barA);g.fillStyle=grad;g.fillRect(40,y,W-80,h)}}
    function logo(){const size=Number(CFG.logoSize),rawY=Number(CFG.logoY)+Math.sin(t*.028)*Number(CFG.bounce)+Math.sin(t*.011)*3,y=Math.max(Number(CFG.logoMinY),Math.min(Number(CFG.logoMaxY),rawY)),x=W/2+Math.sin(t*.018)*Number(CFG.logoSway);g.save();g.translate(x,y);g.scale(1,1+Math.sin(t*.028)*.025);g.textAlign="center";g.textBaseline="middle";g.font="900 "+size+"px Arial Black,Impact,sans-serif";g.lineWidth=Math.max(7,size*.15);g.strokeStyle="#000";g.strokeText(CFG.logoText,0,0);const grad=g.createLinearGradient(0,-size*.65,0,size*.65);grad.addColorStop(0,CFG.logoTop);grad.addColorStop(.56,CFG.logoBottom);grad.addColorStop(1,"#6b3b00");g.shadowColor=CFG.logoBottom;g.shadowBlur=Number(CFG.glow)+vu.reduce((a,b)=>a+b,0)*12;g.fillStyle=grad;g.fillText(CFG.logoText,0,0);g.shadowBlur=0;g.lineWidth=2;g.strokeStyle="#fff";g.strokeText(CFG.logoText,0,0);g.restore();const subY=Math.max(28,Math.min(H-25,y+size*.72));g.textAlign="center";g.textBaseline="middle";g.font="900 14px Arial,sans-serif";const w=g.measureText(CFG.subtitle).width+24;if(CFG.subtitleBox==="on"){g.fillStyle="rgba(0,0,0,.82)";g.fillRect((W-w)/2,subY-12,w,24);g.strokeStyle="rgba(255,204,0,.65)";g.lineWidth=1;g.strokeRect((W-w)/2,subY-12,w,24)}g.lineWidth=5;g.strokeStyle="#000";g.strokeText(CFG.subtitle,W/2,subY);g.fillStyle="#fff7ad";g.fillText(CFG.subtitle,W/2,subY)}
    function bigScroller(){const text="   "+CFG.bigScrollText+"   ",size=Number(CFG.bigScrollSize),speed=Number(CFG.bigScrollSpeed)/10,charW=size*.63,total=text.length*charW,x=W-((t*speed)%(W+total)),minY=Number(CFG.bigScrollMinY),maxY=Number(CFG.bigScrollMaxY),y=Math.max(minY+size/2,Math.min(maxY-size/2,Number(CFG.bigScrollY)));g.fillStyle="rgba(0,0,0,.82)";g.fillRect(0,Math.max(0,minY),W,Math.max(size+30,maxY-minY));g.strokeStyle="#ffcc00";g.lineWidth=1;g.beginPath();g.moveTo(0,minY);g.lineTo(W,minY);g.moveTo(0,maxY);g.lineTo(W,maxY);g.stroke();g.font="900 "+size+"px Arial Black,Impact,sans-serif";g.textAlign="left";g.textBaseline="middle";for(let i=0;i<text.length;i++){const px=x+i*charW;if(px<-50||px>W+50)continue;const py=y+Math.sin(t*.075+i*.34)*6;g.lineWidth=6;g.strokeStyle="#000";g.strokeText(text[i],px,py);g.fillStyle=CFG.rainbow==="on"?`hsl(${(t*2+i*8)%360},100%,68%)`:"#00e5ff";g.fillText(text[i],px,py)}}
    function eq(){const minY=Number(CFG.eqMinY),baseY=Number(CFG.eqMaxY),barW=9,gap=4,startX=(W-(spectrum.length*(barW+gap)-gap))/2,maxH=Math.max(8,baseY-minY);g.fillStyle="rgba(0,0,0,.65)";g.fillRect(0,minY,W,maxH);for(let i=0;i<spectrum.length;i++){const h=Math.min(maxH-2,4+spectrum[i]*(maxH*1.55)),x=startX+i*(barW+gap),y=baseY-h,grad=g.createLinearGradient(0,baseY,0,minY);grad.addColorStop(0,"#00e5ff");grad.addColorStop(.45,"#ffcc00");grad.addColorStop(1,"#ff2d75");g.fillStyle="rgba(0,0,0,.5)";g.fillRect(x-1,minY,barW+2,maxH);g.fillStyle=grad;g.fillRect(x,y,barW,h);g.fillStyle="rgba(255,255,255,.85)";g.fillRect(x,y,barW,1)}}
    function bottomScroller(){const text="   "+CFG.scrollText+"   ",size=Number(CFG.scrollSize),speed=Number(CFG.scrollSpeed)/10,charW=size*.62,total=text.length*charW,x=W-((t*speed)%(W+total)),minY=Number(CFG.scrollMinY),maxY=Number(CFG.scrollMaxY),y=Math.max(minY+size/2,Math.min(maxY-size/2,Number(CFG.scrollY)));g.fillStyle="rgba(0,0,0,.84)";g.fillRect(0,minY,W,Math.max(size+18,maxY-minY));g.font="900 "+size+"px Arial,sans-serif";g.textAlign="left";g.textBaseline="middle";for(let i=0;i<text.length;i++){const px=x+i*charW,py=y+Math.sin(t*.06+i*.31)*2;g.lineWidth=3;g.strokeStyle="#000";g.strokeText(text[i],px,py);g.fillStyle=CFG.scrollColor;g.fillText(text[i],px,py)}}
    function scanlines(){g.fillStyle="rgba(0,0,0,.25)";for(let y=0;y<H;y+=3)g.fillRect(0,y,W,1)}
    function blit(){ctx.imageSmoothingEnabled=false;ctx.fillStyle="#000";ctx.fillRect(0,0,innerWidth,innerHeight);const scale=Math.max(innerWidth/W,innerHeight/H),dw=W*scale,dh=H*scale;ctx.drawImage(buffer,(innerWidth-dw)/2,(innerHeight-dh)/2,dw,dh)}
    draw();
  })();
