   const horizon=layerY(l,t); c.strokeStyle=l.colorA||"#00e5ff"; c.lineWidth=1;
   for(let i=0;i<16;i++){const y=horizon+i*i*.54;c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke()}
   for(let i=-14;i<=14;i++){const x=W/2+i*18;c.beginPath();c.moveTo(W/2,horizon);c.lineTo(x,H);c.stroke()}
 }
 function drawRasters(c,l){
   const count=Number(l.amount)||18,h=Number(l.size)||4,min=Number(l.minY)||145,max=Number(l.maxY)||225,span=Math.max(1,max-min);
   for(let i=0;i<count;i++){const base=min+(i/Math.max(1,count-1))*span;const y=clamp(base+(l.fixed==="on"?0:Math.sin(t*.035*((Number(l.speed)||20)/10)+i*.7)*Number(l.amp||18)),min,max-h);const gr=c.createLinearGradient(40,y,W-40,y);gr.addColorStop(0,l.colorA||"#ff2d75");gr.addColorStop(.5,l.colorB||"#00e5ff");gr.addColorStop(1,l.colorA||"#ff2d75");c.fillStyle=gr;c.fillRect(40,y,W-80,h)}
 }
 function drawLogo(c,l){
   const size=Number(l.size)||48,y=layerY(l,t),x=Number(l.x)||W/2;
   c.save();c.translate(x,y);c.scale(1,1+(l.fixed==="on"?0:Math.sin(t*.028)*.025));c.textAlign="center";c.textBaseline="middle";c.font=`900 ${size}px ${l.font||"Arial Black,Impact,sans-serif"}`;c.lineWidth=Math.max(7,size*.15);c.strokeStyle="#000";c.strokeText(l.text||"DEMOFORGE",0,0);textFill(c,l,0,0);c.shadowColor=l.colorB||"#ffcc00";c.shadowBlur=14;c.fillText(l.text||"DEMOFORGE",0,0);c.shadowBlur=0;c.lineWidth=2;c.strokeStyle="#fff";c.strokeText(l.text||"DEMOFORGE",0,0);c.restore();
 }
 function drawSubtitle(c,l){
   const size=Number(l.size)||14,y=layerY(l,t),x=Number(l.x)||W/2,text=l.text||"BASE DEMO";
   c.font=`900 ${size}px ${l.font||"Arial,sans-serif"}`;c.textAlign="center";c.textBaseline="middle";const w=c.measureText(text).width+24;c.fillStyle="rgba(0,0,0,.84)";c.fillRect(x-w/2,y-size*.85,w,size*1.7);c.strokeStyle="rgba(255,204,0,.75)";c.lineWidth=1;c.strokeRect(x-w/2,y-size*.85,w,size*1.7);c.lineWidth=5;c.strokeStyle="#000";c.strokeText(text,x,y);textFill(c,l,x,y);c.fillText(text,x,y);
 }
 function drawBigScroll(c,l){
   const size=Number(l.size)||24,y=layerY(l,t),text="   "+(l.text||"*** DEMOFORGE BASE DEMO ***")+"   ",speed=(Number(l.speed)||20)/10,charW=size*.63,total=text.length*charW,x=W-((t*speed)%(W+total));
   c.fillStyle="rgba(0,0,0,.82)";c.fillRect(0,l.minY||112,W,Math.max(size+30,(l.maxY||165)-(l.minY||112)));c.strokeStyle=l.colorB||"#ffcc00";c.lineWidth=1;c.beginPath();c.moveTo(0,l.minY||112);c.lineTo(W,l.minY||112);c.moveTo(0,l.maxY||165);c.lineTo(W,l.maxY||165);c.stroke();c.font=`900 ${size}px ${l.font||"Arial Black,Impact,sans-serif"}`;c.textAlign="left";c.textBaseline="middle";
   for(let i=0;i<text.length;i++){const px=x+i*charW;if(px<-50||px>W+50)continue;const py=y+Math.sin(t*.075+i*.34)*Number(l.amp||4);c.lineWidth=6;c.strokeStyle="#000";c.strokeText(text[i],px,py);textFill(c,l,px,py,i);c.fillText(text[i],px,py)}
 }
 function drawScroll(c,l){
   const size=Number(l.size)||11,y=layerY(l,t),text="   "+(l.text||"BASE DEMO · EXPORTABLE ·")+"   ",speed=(Number(l.speed)||16)/10,charW=size*.62,total=text.length*charW,x=W-((t*speed)%(W+total));
   c.fillStyle="rgba(0,0,0,.84)";c.fillRect(0,l.minY||246,W,Math.max(size+18,(l.maxY||270)-(l.minY||246)));c.font=`900 ${size}px ${l.font||"Arial,sans-serif"}`;c.textAlign="left";c.textBaseline="middle";
   for(let i=0;i<text.length;i++){const px=x+i*charW,py=y+Math.sin(t*.06+i*.31)*Number(l.amp||2);c.lineWidth=3;c.strokeStyle="#000";c.strokeText(text[i],px,py);textFill(c,l,px,py,i);c.fillText(text[i],px,py)}
 }
 function drawEq(c,l){
   const min=Number(l.minY)||184,base=Number(l.maxY)||234,barW=Number(l.size)||9,gap=4,n=Number(l.amount)||32,start=(W-(n*(barW+gap)-gap))/2,maxH=Math.max(8,base-min);
   c.fillStyle="rgba(0,0,0,.65)";c.fillRect(0,min,W,maxH);
   for(let i=0;i<n;i++){const v=.35+.25*Math.sin(t*.08+i*.7)+.2*Math.sin(t*.031+i),h=Math.min(maxH-2,4+Math.abs(v)*(maxH*1.2)),x=start+i*(barW+gap),y=base-h,gr=c.createLinearGradient(0,base,0,min);gr.addColorStop(0,l.colorA||"#00e5ff");gr.addColorStop(.5,"#ffcc00");gr.addColorStop(1,l.colorB||"#ff2d75");c.fillStyle=gr;c.fillRect(x,y,barW,h)}
 }
 function drawScanlines(c,l){c.fillStyle=`rgba(0,0,0,${(Number(l.opacity)||25)/100})`;for(let y=0;y<H;y+=Math.max(2,Number(l.size)||3))c.fillRect(0,y,W,1)}
 function drawScene(){
   const bg=g.createLinearGradient(0,0,0,H);bg.addColorStop(0,"#02030a");bg.addColorStop(.5,"#09001f");bg.addColorStop(1,"#000");g.fillStyle=bg;g.fillRect(0,0,W,H);
   for(const l of project.layers||[]){if(l.visible==="off")continue;g.save();g.globalAlpha=(Number(l.opacity)||100)/100;
     if(l.type==="plasma")drawPlasma(g,l);else if(l.type==="stars")drawStars(g,l);else if(l.type==="grid")drawGrid(g,l);else if(l.type==="rasters")drawRasters(g,l);else if(l.type==="logo")drawLogo(g,l);else if(l.type==="subtitle")drawSubtitle(g,l);else if(l.type==="bigscroll")drawBigScroll(g,l);else if(l.type==="scroll")drawScroll(g,l);else if(l.type==="equalizer")drawEq(g,l);else if(l.type==="scanlines")drawScanlines(g,l);
     g.restore();}
 }
 function resize(){const d=Math.min(devicePixelRatio||1,2);canvas.width=innerWidth*d;canvas.height=innerHeight*d;ctx.setTransform(d,0,0,d,0,0)}
 addEventListener("resize",resize);resize();initStars();
 function frame(){drawScene();ctx.imageSmoothingEnabled=false;ctx.fillStyle="#000";ctx.fillRect(0,0,innerWidth,innerHeight);const sc=Math.max(innerWidth/W,innerHeight/H),dw=W*sc,dh=H*sc;ctx.drawImage(buf,(innerWidth-dw)/2,(innerHeight-dh)/2,dw,dh);t++;requestAnimationFrame(frame)}
 const audio=document.getElementById("userAudio");function startAudio(){if(audio){audio.volume=(project.volume||42)/100;audio.play().catch(()=>{})}}
 startAudio();addEventListener("pointerdown",startAudio,{once:true});addEventListener("keydown",startAudio,{once:true});
 frame();
})();
</script>
