<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DemoForge EDU v0.2</title>
<style>
:root{--bg:#050505;--panel:#101010;--panel2:#070707;--line:#2a2a2a;--text:#f1f1f1;--muted:#9a9a9a;--accent:#ffcc00;--cyan:#00e5ff;--ok:#7CFC00;--bad:#ff4b6e;--r:2px;--gap:8px}
body[data-skin="light"]{--bg:#f4f4f4;--panel:#fff;--panel2:#eee;--line:#ccc;--text:#111;--muted:#555;--accent:#c47a00;--cyan:#0070a0;--ok:#1e8e1e;--bad:#c41a3b}
body[data-skin="amber"]{--bg:#0a0500;--panel:#150a00;--panel2:#0a0500;--line:#3a2400;--text:#ffb84d;--muted:#a06a18;--accent:#ffaa00;--cyan:#ffaa00;--ok:#ffd070;--bad:#ff4b00}
body[data-skin="c64"]{--bg:#3526a8;--panel:#5040c8;--panel2:#3526a8;--line:#7060e8;--text:#a8a0ff;--muted:#7060e8;--accent:#ffffff;--cyan:#a8a0ff;--ok:#80ff80;--bad:#ff8080}
body[data-skin="mint"]{--bg:#0a1a14;--panel:#0f2820;--panel2:#0a1a14;--line:#1e4030;--text:#d0f0e0;--muted:#7aa090;--accent:#5fffaf;--cyan:#5fd0ff;--ok:#5fffaf;--bad:#ff5f8f}
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--text);font:13px/1.4 Arial,Helvetica,sans-serif;overflow:hidden}body{display:grid;grid-template-columns:minmax(430px,500px) 1fr}aside{height:100vh;overflow:auto;background:var(--panel);border-right:1px solid var(--line);padding:12px}main{height:100vh;background:#000;position:relative;overflow:hidden}canvas#screen{display:block;width:100%;height:100%;image-rendering:pixelated;cursor:crosshair}.topbar{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end;margin-bottom:8px}h1{margin:0;font-size:22px;letter-spacing:.02em}.ver{color:var(--accent);font-size:11px}.hint{color:var(--muted);font-size:11px;line-height:1.35;margin:4px 0}.row{display:grid;grid-template-columns:1fr 1fr;gap:6px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.row4{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}label{display:grid;gap:3px;margin-bottom:6px;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}input,select,textarea,button{font:inherit}input,select,textarea{width:100%;padding:6px 7px;border:1px solid var(--line);background:var(--panel2);color:var(--text);outline:none;border-radius:var(--r)}input:focus,select:focus,textarea:focus{border-color:var(--cyan)}input[type=color]{height:30px;padding:2px}input[type=range]{padding:0;height:24px}button{border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:6px 8px;cursor:pointer;border-radius:var(--r);transition:border-color .15s,background .15s}button:hover:not(:disabled){border-color:var(--cyan)}button.primary{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}button.ok{color:var(--ok);border-color:var(--ok)}button.danger{color:var(--bad);border-color:var(--bad)}button.on{background:var(--ok);color:#000;border-color:var(--ok);font-weight:700}.modes{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:8px}.skin-pick{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:6px}.skin-pick button{padding:4px 2px;font-size:10px}.skin-pick button.on{border-color:var(--accent);color:var(--accent);background:transparent}details{border:1px solid var(--line);background:var(--panel2);margin-bottom:8px;border-radius:var(--r)}summary{cursor:pointer;list-style:none;padding:8px 10px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);font-weight:700;display:flex;align-items:center;gap:6px;user-select:none}summary::before{content:"▶";font-size:9px;color:var(--cyan)}details[open] summary::before{content:"▼"}summary::-webkit-details-marker{display:none}.inner{padding:8px 10px;border-top:1px solid var(--line)}.meters{display:grid;grid-template-columns:repeat(16,1fr);gap:2px;height:28px;align-items:end;margin:6px 0}.meter{background:var(--cyan);height:2px;opacity:.55}.music-item,.asset-item{display:grid;grid-template-columns:1fr auto auto auto;gap:4px;align-items:center;border:1px solid var(--line);background:var(--panel);padding:4px;margin-bottom:3px}.music-item button,.asset-item button{padding:3px 5px;font-size:10px}.bank{max-height:120px;overflow:auto;border:1px dashed var(--line);padding:4px}.dropzone{border:1px dashed var(--cyan);padding:8px;text-align:center;color:var(--muted);margin-bottom:6px}.layer-list{display:grid;gap:4px;max-height:54vh;overflow:auto;position:relative}.layer{border:1px solid var(--line);background:var(--panel);padding:0;border-radius:var(--r);cursor:default;overflow:hidden}.layer.active{border-color:var(--cyan);box-shadow:0 0 0 1px var(--cyan) inset}.layer.hidden-l{opacity:.45}.lhead{display:grid;grid-template-columns:24px 32px 1fr auto;gap:5px;align-items:center;padding:5px 6px}.expand{padding:2px 4px}.lthumb{width:32px;height:18px;background:#000;border:1px solid var(--line);image-rendering:pixelated}.lname{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.lmeta{font-size:9px;color:var(--muted)}.ltools{display:flex;gap:2px;align-items:center}.ltools button{padding:3px 5px;font-size:11px;line-height:1}.qbtn{background:#6d0000!important;color:#fff!important;border-color:#ff3333!important;border-radius:50%;width:20px;height:20px;padding:0!important;font-weight:700}.lsettings{padding:6px;border-top:1px solid var(--line)}.group-title{color:var(--cyan);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin:6px 0 4px}.param{display:grid;grid-template-columns:76px 1fr 64px;gap:5px;align-items:center;margin:3px 0}.param span{font-size:10px;color:var(--muted);text-transform:uppercase}.param output{font-size:10px;color:var(--accent);text-align:right}.formula{grid-column:2/4;font-size:10px;padding:4px;margin-bottom:3px}.pro,.max{display:block}body[data-mode="NOOB"] .pro,body[data-mode="NOOB"] .max{display:none!important}body[data-mode="PRO"] .max{display:none!important}.tl{height:32px;background:var(--panel);border:1px solid var(--line);position:relative;margin:4px 0 8px}.tlrange{position:absolute;top:7px;height:16px;background:rgba(0,229,255,.35);border:1px solid var(--cyan)}.tlplay{position:absolute;top:0;bottom:0;width:1px;background:var(--accent)}#toast{position:absolute;right:12px;bottom:12px;border:1px solid var(--accent);color:var(--accent);background:rgba(0,0,0,.75);padding:6px 10px;opacity:0;transition:.15s;pointer-events:none}#toast.show{opacity:1}.overlayName{position:absolute;left:10px;top:10px;color:var(--ok);background:rgba(0,0,0,.6);font:11px ui-monospace,monospace;padding:5px 7px;border:1px solid var(--ok)}@media(max-width:900px){body{grid-template-columns:1fr}aside{height:48vh}main{height:52vh}}
</style>
</head>
<body data-skin="mint" data-mode="MAX">
<aside id="sidebar">
 <div class="topbar"><h1>DemoForge <small>EDU</small></h1><div class="ver">v0.2</div></div>
 <div class="modes" id="modes"><button data-mode="NOOB">NOOB</button><button data-mode="PRO">PRO</button><button data-mode="MAX" class="on">MAX</button></div>
 <div class="skin-pick" id="skinPick"><button data-skin="default">default</button><button data-skin="light">light</button><button data-skin="amber">amber</button><button data-skin="c64">c64</button><button data-skin="mint" class="on">mint</button></div>

 <details open>
  <summary>Musique</summary>
  <div class="inner">
   <div class="dropzone" id="musicDrop">Dépose MP3 / OGG / WAV ici</div>
   <input id="musicUp" type="file" accept="audio/*,.mp3,.ogg,.wav" multiple>
   <div class="row4" style="margin-top:6px"><button id="musicPlay" class="primary">Play</button><button id="musicStop">Stop</button><button id="musicMute">Mute</button><button id="musicLoop">Boucle</button></div>
   <div class="meters" id="meters"></div>
   <label>Timeline musique <input id="musicSeek" type="range" min="0" max="1000" value="0"></label>
   <div class="row3"><label>Entrée s<input id="musicIn" type="number" min="0" step=".1" value="0"></label><label>Sortie s<input id="musicOut" type="number" min="0" step=".1" value="0"></label><label>Stop s<input id="musicStopAt" type="number" min="0" step=".1" value="0"></label></div>
   <div id="musicList" class="bank"><p class="hint">Aucune musique. Chaînage automatique dans l’ordre.</p></div>
  </div>
 </details>

 <details open>
  <summary>Scène · Presets</summary>
  <div class="inner">
   <div class="row"><select id="scenePreset"><option value="blank">00.1 Vierge</option><option value="demo">01 DemoForge Classic</option><option value="learn">02 Learn Plasma</option></select><button id="applyScene" class="primary">Appliquer</button></div>
   <div class="row3" style="margin-top:6px"><button id="newProject">Nouveau</button><button id="exportHtml" class="primary">Export HTML</button><button id="exportState">Export réglages</button></div>
   <div class="row" style="margin-top:6px"><button id="importStateBtn">Import réglages</button><button id="repairState" class="ok">Réparer timeline</button></div><input id="importState" type="file" accept=".json" style="display:none">
  </div>
 </details>

 <details open>
  <summary>Banque d'assets</summary>
  <div class="inner">
   <div class="dropzone" id="assetDrop">Dépose images / vidéos / SVG / HTML / fontes ici</div>
   <label>Assets externes<input id="mediaUp" type="file" accept="image/*,video/*,.svg,.html,.htm,.ttf,.otf,.woff,.woff2" multiple></label>
   <div class="group-title">Fontes</div>
   <div id="fontBank" class="bank"><p class="hint">Aucune fonte.</p></div>
   <label>Associer la fonte sélectionnée à<select id="fontTarget"></select></label>
   <button id="applyFont">Associer fonte</button>
   <div class="group-title">Médias</div><div id="assetBank" class="bank"><p class="hint">Aucun média.</p></div>
  </div>
 </details>

 <details open>
  <summary>Calques (<span id="layerCount">0</span>)</summary>
  <div class="inner">
   <div class="row"><select id="addType"><option value="plasma">Plasma</option><option value="stars">Étoiles</option><option value="grid">Grille</option><option value="rasters">Rasters</option><option value="logo">Logo</option><option value="scroll">Scroller</option><option value="equalizer">Equalizer</option><option value="scanlines">Scanlines</option><option value="image">Image</option><option value="video">Vidéo</option></select><button id="addLayer" class="primary">＋ Ajouter</button></div>
   <div id="layerList" class="layer-list" style="margin-top:6px"></div>
  </div>
 </details>

 <details open>
  <summary>Timeline</summary>
  <div class="inner">
   <div class="row3"><button id="tlPlay" class="primary">▶</button><button id="tlStop">■</button><label>Durée<input id="tlTotal" type="number" min="2" max="600" value="30"></label></div>
   <label>Position <input id="tlPos" type="range" min="0" max="1000" value="0"></label>
   <div id="tlStrips"></div>
  </div>
 </details>
</aside>
<main><canvas id="screen" width="960" height="540"></canvas><div class="overlayName" id="overlayName">DemoForge EDU v0.2</div><div id="toast"></div></main>
<audio id="audio" crossorigin="anonymous"></audio>
<script>
(()=>{'use strict';
const W=480,H=270,STORE='demoforge_edu_v02';
const $=id=>document.getElementById(id);const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));const uid=()=>Math.random().toString(36).slice(2,9);const esc=s=>String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const EFFECT_INFO={plasma:{n:'Plasma',creator:'Demoscene PC / Future Crew era',origin:'Dégradés sinusoïdaux animés, popularisés dans les démos PC années 90.'},stars:{n:'Starfield',creator:'Demoscene 80s/90s',origin:'Simulation de profondeur par étoiles projetées vers la caméra.'},grid:{n:'Vector Grid',creator:'Tron / synthwave tradition',origin:'Sol perspectif avec lignes convergentes.'},rasters:{n:'Copper Bars',creator:'Amiga Copper',origin:'Bandes horizontales issues des changements de couleur ligne par ligne.'},logo:{n:'Bouncing Logo',creator:'Cracktros Atari/Amiga',origin:'Logo animé au sinus.'},scroll:{n:'Scroller',creator:'C64 / Atari ST crews',origin:'Texte défilant utilisé pour greetings et crédits.'},equalizer:{n:'Equalizer',creator:'VU meter / Web Audio API',origin:'Visualisation fréquentielle bass/mid/treble.'},scanlines:{n:'CRT Scanlines',creator:'Affichage cathodique',origin:'Simulation des lignes noires CRT.'},image:{n:'Image',creator:'Utilisateur',origin:'Calque média bitmap.'},video:{n:'Vidéo',creator:'Utilisateur',origin:'Calque vidéo rendu dans le canvas.'}};
const PRESETS={};Object.keys(EFFECT_INFO).forEach(k=>{PRESETS[k]=Array.from({length:15},(_,i)=>({name:`Preset ${i+1}`,size:8+i*3,speed:10+i*4,amp:8+i*3,opacity:40+i*4,amount:40+i*20,colorA:['#00e5ff','#ffcc00','#ff00aa','#7CFC00','#ffffff'][i%5],colorB:['#ff00aa','#00e5ff','#ff6600','#3526a8','#ffaa00'][(i+2)%5]}));});
let project={version:'0.2',mode:'MAX',skin:'mint',duration:30,layers:[],musics:[],assets:[],fonts:[],selected:0};let play=false,startTime=0,tlTime=0,drag=null;
const canvas=$('screen'),ctx=canvas.getContext('2d');const audio=$('audio');let AC,analyser,srcNode,dataArr=new Uint8Array(64),eq=Array(16).fill(0),musicIndex=-1,musicLoop=false,musicMute=false;
function toast(m){$('toast').textContent=m;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1400)}
function baseLayer(type){let p=PRESETS[type]?.[0]||{};return {id:uid(),type,name:EFFECT_INFO[type]?.n||type,open:true,visible:true,locked:false,x:240,y:135,z:0,w:160,h:80,opacity:p.opacity||80,params:{text:type==='logo'?'DEMOFORGE':type==='scroll'?'WELCOME TO DEMOFORGE EDU V0.2 --- ':'',size:p.size||20,speed:p.speed||20,amp:p.amp||10,amount:p.amount||80,colorA:p.colorA||'#00e5ff',colorB:p.colorB||'#ffcc00',blend:'source-over',font:'Arial',preset:0,formulaX:'',formulaY:'',formulaZ:''},timeline:{in:0,out:0,stop:0,loop:true},assetId:null};}
function demoLayers(){return ['plasma','stars','grid','rasters','logo','scroll','equalizer','scanlines'].map(type=>baseLayer(type)).map((l,i)=>{l.name=['Soft Plasma','Deep Stars','Retro Grid','Classic Copper','Gold Bounce','Bottom Scroller','Bass Reactive','CRT Light'][i]; if(l.type==='logo'){l.y=92;l.params.size=42;l.params.colorA='#ffcc00';l.params.colorB='#ffffff'} if(l.type==='scroll'){l.y=238;l.params.size=14;l.params.speed=28;l.params.colorA='#00e5ff'} if(l.type==='scanlines'){l.opacity=28;l.params.size=4} if(l.type==='equalizer'){l.y=220;l.params.amount=32;l.params.size=6;l.opacity=90} return l;});}
function applyScene(kind){if(kind==='blank'){project.layers=[];project.selected=-1;toast('Preset 00.1 vierge');}else if(kind==='learn'){project.layers=[baseLayer('plasma')];project.layers[0].name='Learn Plasma';project.selected=0;toast('Preset Learn Plasma');}else{project.layers=demoLayers();project.selected=0;toast('Demo chargée');}renderUI();}
function renderUI(){document.body.dataset.mode=project.mode;document.body.dataset.skin=project.skin;$('tlTotal').value=project.duration;$('layerCount').textContent=project.layers.length;document.querySelectorAll('#modes button').forEach(b=>b.classList.toggle('on',b.dataset.mode===project.mode));document.querySelectorAll('#skinPick button').forEach(b=>b.classList.toggle('on',b.dataset.skin===project.skin));renderMusic();renderAssets();renderLayers();renderTimeline();save();}
function pct(v,min,max){return Math.round(((Number(v)-min)/(max-min))*100)}
function paramHTML(l,key,label,min,max,step=1){let val=key in l?l[key]:l.params[key];return `<div class="param"><span>${label}</span><input type="range" data-f="${key}" min="${min}" max="${max}" step="${step}" value="${val}"><output>${val} (${pct(val,min,max)}%)</output><input class="formula max" data-formula="${key}" placeholder="formule ${label} à définir" value="${esc(l.params['formula'+key.toUpperCase()]||'')}"></div>`}
function renderLayers(){let box=$('layerList');box.innerHTML='';let fontTarget=$('fontTarget');fontTarget.innerHTML='';project.layers.forEach((l,i)=>{fontTarget.add(new Option(`${i+1}. ${l.name}`,l.id));let d=document.createElement('div');d.className='layer '+(i===project.selected?'active ':'')+(!l.visible?'hidden-l ':'');d.dataset.idx=i;d.draggable=true;d.innerHTML=`<div class="lhead"><button class="expand" data-act="expand">${l.open?'▾':'▸'}</button><canvas class="lthumb" width="64" height="36"></canvas><div><div class="lname">${i+1}. ${esc(l.name)}</div><div class="lmeta">${l.type} · ${l.opacity}% · z ${l.z}</div></div><div class="ltools"><button data-act="eye">👁</button><button data-act="lock">🔒</button><button data-act="del" class="danger">X</button><button data-act="more">...</button><button data-act="info" class="qbtn">?</button></div></div>${l.open?settingsHTML(l):''}`;box.appendChild(d);thumb(d.querySelector('canvas'),l);});}
function settingsHTML(l){let presets=(PRESETS[l.type]||[]).map((p,i)=>`<option value="${i}" ${l.params.preset==i?'selected':''}>${i+1}. ${p.name}</option>`).join('');return `<div class="lsettings"><div class="row"><label>Nom<input data-f="name" value="${esc(l.name)}"></label><label>Style avancé<select data-f="preset">${presets}</select></label></div><div class="group-title">Essentiels</div>${paramHTML(l,'x','X',-240,720)}${paramHTML(l,'y','Y',-135,405)}${paramHTML(l,'z','Z profondeur',-100,100)}${paramHTML(l,'opacity','Opacité',0,100)}<div class="group-title pro">Style</div><div class="row pro"><label>Couleur A<input data-f="colorA" type="color" value="${l.params.colorA}"></label><label>Couleur B / dégradé<input data-f="colorB" type="color" value="${l.params.colorB}"></label></div><div class="pro">${paramHTML(l,'size','Taille',1,180)}${paramHTML(l,'speed','Vitesse',0,100)}${paramHTML(l,'amp','Amplitude',0,160)}</div><div class="max">${paramHTML(l,'amount','Quantité',0,800)}<label>Blend<select data-f="blend"><option>source-over</option><option>lighter</option><option>screen</option><option>multiply</option></select></label></div><div class="group-title pro">Entrée / sortie</div><div class="row3 pro"><label>Entrée<input data-f="timeline.in" type="number" min="0" step=".1" value="${l.timeline.in}"></label><label>Sortie<input data-f="timeline.out" type="number" min="0" step=".1" value="${l.timeline.out}"></label><label>Stop<input data-f="timeline.stop" type="number" min="0" step=".1" value="${l.timeline.stop}"></label></div></div>`}
function renderTimeline(){let b=$('tlStrips');b.innerHTML='';project.layers.forEach((l,i)=>{let total=project.duration||30,inn=Number(l.timeline.in)||0,out=Number(l.timeline.out)||total;if(!out)out=total;let left=clamp(inn/total*100,0,100),width=clamp((out-inn)/total*100,0,100);let row=document.createElement('div');row.innerHTML=`<div class="lmeta">${i+1}. ${esc(l.name)}</div><div class="tl"><div class="tlrange" data-idx="${i}" style="left:${left}%;width:${width}%"></div><div class="tlplay" style="left:${tlTime/total*100}%"></div></div>`;b.appendChild(row);});}
function renderMusic(){let list=$('musicList');list.innerHTML='';if(!project.musics.length){list.innerHTML='<p class="hint">Aucune musique. Chaînage automatique dans l’ordre.</p>'}project.musics.forEach((m,i)=>{let d=document.createElement('div');d.className='music-item';d.innerHTML=`<span>${i+1}. ${esc(m.name)}</span><button data-mi="${i}" data-ma="play">Play</button><button data-mi="${i}" data-ma="stop">Stop</button><button data-mi="${i}" data-ma="del" class="danger">Supprime</button>`;list.appendChild(d);});}
function renderAssets(){let fb=$('fontBank');fb.innerHTML='';if(!project.fonts.length)fb.innerHTML='<p class="hint">Aucune fonte.</p>';project.fonts.forEach((f,i)=>{let d=document.createElement('div');d.className='asset-item';d.innerHTML=`<span style="font-family:${esc(f.family)}">${esc(f.name)} — Aperçu DemoForge</span><button data-font="${i}">Choisir</button><button data-fontdel="${i}" class="danger">X</button>`;fb.appendChild(d);});let ab=$('assetBank');ab.innerHTML='';if(!project.assets.length)ab.innerHTML='<p class="hint">Aucun média.</p>';project.assets.forEach((a,i)=>{let d=document.createElement('div');d.className='asset-item';d.innerHTML=`<span>${esc(a.name)}</span><button data-asset="${i}">Calque</button><button data-assetdel="${i}" class="danger">X</button>`;ab.appendChild(d);});}
function active(l,t){let inn=Number(l.timeline.in)||0,out=Number(l.timeline.out)||0,stop=Number(l.timeline.stop)||0;if(stop&&t>stop)return false;if(out&&t>out)return false;return t>=inn}
function draw(){requestAnimationFrame(draw);let now=performance.now()/1000;if(play)tlTime=(now-startTime)%project.duration;else tlTime=Number($('tlPos').value)/1000*project.duration;$('tlPos').value=Math.floor(tlTime/project.duration*1000);ctx.setTransform(canvas.width/W,0,0,canvas.height/H,0,0);ctx.clearRect(0,0,W,H);ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);updateAudio();project.layers.forEach((l,i)=>{if(!l.visible||!active(l,tlTime))return;ctx.save();ctx.globalAlpha=(l.opacity/100);ctx.globalCompositeOperation=l.params.blend||'source-over';drawLayer(l,tlTime,i);ctx.restore();});$('overlayName').textContent=`DemoForge EDU v0.2 · ${project.layers.length} calques · ${play?'play':'stop'}`;}
function drawLayer(l,t,i){let zscale=1+(Number(l.z)||0)/180,x=Number(l.x),y=Number(l.y),p=l.params,s=Number(p.size)||10,spd=(Number(p.speed)||0)/20;if(l.type==='plasma'){for(let yy=0;yy<H;yy+=s){for(let xx=0;xx<W;xx+=s){let v=Math.sin(xx*.04+t*spd)+Math.sin(yy*.05+t*spd*1.2)+Math.sin((xx+yy)*.03+t);let a=(v+3)/6;ctx.fillStyle=mix(p.colorA,p.colorB,a);ctx.fillRect(xx,yy,s+1,s+1)}}}else if(l.type==='stars'){ctx.fillStyle=p.colorA;let n=Number(p.amount)||80;for(let k=0;k<n;k++){let seed=(k*9301+49297)%233280;let sx=((seed/233280*W*3)-(t*30*spd+k*7)%W*3)%W;let sy=((k*53)%H);let r=1+((k%5)/3)*zscale;ctx.fillRect((sx+W)%W,sy,r,r)}}else if(l.type==='grid'){ctx.strokeStyle=p.colorA;ctx.lineWidth=1;let horizon=y;for(let yy=horizon;yy<H;yy+=12+Math.sin(t)*2){ctx.beginPath();ctx.moveTo(0,yy);ctx.lineTo(W,yy);ctx.stroke()}for(let k=-10;k<=10;k++){ctx.beginPath();ctx.moveTo(W/2,horizon);ctx.lineTo(W/2+k*42,H);ctx.stroke()}}else if(l.type==='rasters'){let n=Number(p.amount)||40;for(let k=0;k<n;k++){ctx.fillStyle=mix(p.colorA,p.colorB,k/n);let yy=(y+Math.sin(t*spd+k*.3)*(Number(p.amp)||10)+k*4)%H;ctx.fillRect(0,yy,W,Number(p.size)||8)}}else if(l.type==='logo'){ctx.font=`bold ${s*zscale}px ${p.font||'Arial'}`;ctx.textAlign='center';ctx.fillStyle=p.colorB;ctx.fillText(p.text||l.name,x+2,y+2+Math.sin(t*spd)*(Number(p.amp)||0));ctx.fillStyle=p.colorA;ctx.fillText(p.text||l.name,x,y+Math.sin(t*spd)*(Number(p.amp)||0))}else if(l.type==='scroll'){ctx.font=`bold ${s}px ${p.font||'Arial'}`;ctx.fillStyle=p.colorA;let text=p.text||'SCROLLER';let tw=ctx.measureText(text).width;ctx.fillText(text,W-((t*(Number(p.speed)||20)*10)%(W+tw)),y)}else if(l.type==='equalizer'){let bars=Number(p.amount)||32,bw=W/bars;for(let k=0;k<bars;k++){let h=(eq[k%eq.length]||.1)*80+5;ctx.fillStyle=mix(p.colorA,p.colorB,k/bars);ctx.fillRect(k*bw,H-h,Math.max(1,bw-2),h)}}else if(l.type==='scanlines'){ctx.fillStyle='#000';let step=Number(p.size)||4;for(let yy=0;yy<H;yy+=step)ctx.fillRect(0,yy,W,1)}else if(l.type==='image'||l.type==='video'){ctx.strokeStyle=p.colorA;ctx.strokeRect(x-50,y-30,100,60);ctx.fillStyle=p.colorA;ctx.fillText(l.assetId?'MEDIA':'IMPORT MEDIA',x-42,y)}}
function mix(a,b,t){let A=hex(a),B=hex(b);return `rgb(${Math.round(A[0]*(1-t)+B[0]*t)},${Math.round(A[1]*(1-t)+B[1]*t)},${Math.round(A[2]*(1-t)+B[2]*t)})`}function hex(h){h=(h||'#fff').replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');return [0,2,4].map(i=>parseInt(h.slice(i,i+2),16)||0)}
function thumb(c,l){let x=c.getContext('2d');x.fillStyle='#000';x.fillRect(0,0,64,36);x.fillStyle=l.params.colorA||'#0ff';x.fillRect(2,2,60,32);x.fillStyle='#000';x.font='10px Arial';x.fillText(l.type,4,20)}
function initAudio(){if(AC)return;AC=new (window.AudioContext||window.webkitAudioContext)();analyser=AC.createAnalyser();analyser.fftSize=128;srcNode=AC.createMediaElementSource(audio);srcNode.connect(analyser);analyser.connect(AC.destination);dataArr=new Uint8Array(analyser.frequencyBinCount);}
function updateAudio(){if(analyser){analyser.getByteFrequencyData(dataArr);for(let i=0;i<16;i++)eq[i]=(dataArr[i*2]||0)/255;document.querySelectorAll('.meter').forEach((m,i)=>m.style.height=(2+eq[i]*26)+'px')}if(audio.duration){$('musicSeek').value=Math.floor(audio.currentTime/audio.duration*1000)}let stop=Number($('musicStopAt').value)||0,out=Number($('musicOut').value)||0;if(!audio.paused&&((stop&&audio.currentTime>=stop)||(out&&audio.currentTime>=out)))nextMusic();}
function playMusic(i=musicIndex){if(!project.musics.length)return toast('Aucune musique');initAudio();if(i<0)i=0;musicIndex=i;audio.src=project.musics[i].src;audio.muted=musicMute;audio.currentTime=Number($('musicIn').value)||0;audio.play();toast('Musique play');}
function nextMusic(){if(musicLoop){playMusic(musicIndex);return}if(musicIndex+1<project.musics.length)playMusic(musicIndex+1);else audio.pause();}
audio.addEventListener('ended',nextMusic);function handleFiles(files){[...files].forEach(file=>{let r=new FileReader();r.onload=e=>{let src=e.target.result;if(file.type.startsWith('audio'))project.musics.push({name:file.name,src,in:0,out:0,stop:0});else if(/font|woff|ttf|otf/.test(file.type)||/\.(ttf|otf|woff2?)$/i.test(file.name)){let fam='DF_'+uid();let st=document.createElement('style');st.textContent=`@font-face{font-family:${fam};src:url(${src})}`;document.head.appendChild(st);project.fonts.push({name:file.name,src,family:fam});}else project.assets.push({name:file.name,src,type:file.type});renderUI();toast('Asset importé')};r.readAsDataURL(file);});}
$('musicUp').onchange=e=>handleFiles(e.target.files);$('mediaUp').onchange=e=>handleFiles(e.target.files);['musicDrop','assetDrop'].forEach(id=>{let el=$(id);el.ondragover=e=>{e.preventDefault();el.style.borderColor='var(--accent)'};el.ondragleave=()=>el.style.borderColor='var(--cyan)';el.ondrop=e=>{e.preventDefault();handleFiles(e.dataTransfer.files);el.style.borderColor='var(--cyan)';};});
$('modes').onclick=e=>{if(e.target.dataset.mode){project.mode=e.target.dataset.mode;renderUI();}};$('skinPick').onclick=e=>{if(e.target.dataset.skin){project.skin=e.target.dataset.skin;renderUI();}};$('applyScene').onclick=()=>applyScene($('scenePreset').value);$('newProject').onclick=()=>applyScene('blank');$('addLayer').onclick=()=>{project.layers.unshift(baseLayer($('addType').value));project.selected=0;renderUI();};$('repairState').onclick=()=>{project.layers.forEach(l=>{l.open=!!l.open;l.timeline=l.timeline||{in:0,out:0,stop:0,loop:true};});toast('Timeline réparée');renderUI();};
$('layerList').onclick=e=>{let layerEl=e.target.closest('.layer');if(!layerEl)return;let i=Number(layerEl.dataset.idx);project.selected=i;let act=e.target.dataset.act;if(act==='expand')project.layers[i].open=!project.layers[i].open;if(act==='eye')project.layers[i].visible=!project.layers[i].visible;if(act==='lock')project.layers[i].locked=!project.layers[i].locked;if(act==='del'){project.layers.splice(i,1);project.selected=Math.min(i,project.layers.length-1)}if(act==='info'){let inf=EFFECT_INFO[project.layers[i].type];alert(`${inf.n}\nCréateur/origine: ${inf.creator}\n${inf.origin}\nInfos détaillées à compléter.`)}if(act==='more')toast('Menu avancé à compléter');renderUI();setTimeout(()=>{$('layerList').scrollTop=0},0);};
$('layerList').oninput=e=>{let i=project.selected,l=project.layers[i];if(!l)return;let f=e.target.dataset.f;if(!f)return;let v=e.target.value;if(f==='name')l.name=v;else if(f==='preset'){let pr=PRESETS[l.type][Number(v)];Object.assign(l.params,pr,{preset:Number(v)});}else if(f.startsWith('timeline.'))l.timeline[f.split('.')[1]]=Number(v);else if(f in l)l[f]=isNaN(v)?v:Number(v);else l.params[f]=isNaN(v)?v:Number(v);renderUI();};
$('layerList').addEventListener('dragstart',e=>{let l=e.target.closest('.layer');if(l)drag=Number(l.dataset.idx)});$('layerList').addEventListener('dragover',e=>{e.preventDefault()});$('layerList').addEventListener('drop',e=>{e.preventDefault();let l=e.target.closest('.layer');if(l&&drag!==null){let to=Number(l.dataset.idx);let [m]=project.layers.splice(drag,1);project.layers.splice(to,0,m);project.selected=to;drag=null;renderUI();}});
$('musicList').onclick=e=>{let i=Number(e.target.dataset.mi),a=e.target.dataset.ma;if(!a)return;if(a==='play')playMusic(i);if(a==='stop')audio.pause();if(a==='del'){project.musics.splice(i,1);if(i===musicIndex){audio.pause();musicIndex=-1}renderUI();}};$('musicPlay').onclick=()=>playMusic();$('musicStop').onclick=()=>{audio.pause();audio.currentTime=0};$('musicMute').onclick=()=>{musicMute=!musicMute;audio.muted=musicMute;$('musicMute').classList.toggle('on',musicMute)};$('musicLoop').onclick=()=>{musicLoop=!musicLoop;$('musicLoop').classList.toggle('on',musicLoop)};$('musicSeek').oninput=e=>{if(audio.duration)audio.currentTime=e.target.value/1000*audio.duration};for(let i=0;i<16;i++){let m=document.createElement('div');m.className='meter';$('meters').appendChild(m)}
$('tlPlay').onclick=()=>{play=true;startTime=performance.now()/1000-tlTime;toast('Timeline play')};$('tlStop').onclick=()=>{play=false;tlTime=0;$('tlPos').value=0};$('tlTotal').onchange=e=>{project.duration=Number(e.target.value)||30;renderUI()};$('tlPos').oninput=e=>{play=false;tlTime=e.target.value/1000*project.duration;renderTimeline()};
$('fontBank').onclick=e=>{if(e.target.dataset.font!==undefined){$('fontBank').dataset.sel=e.target.dataset.font;toast('Fonte sélectionnée')}if(e.target.dataset.fontdel!==undefined){project.fonts.splice(Number(e.target.dataset.fontdel),1);renderUI();}};$('applyFont').onclick=()=>{let fi=Number($('fontBank').dataset.sel||0),id=$('fontTarget').value,f=project.fonts[fi],l=project.layers.find(x=>x.id===id);if(f&&l){l.params.font=f.family;toast('Fonte associée');renderUI();}};$('assetBank').onclick=e=>{if(e.target.dataset.asset!==undefined){let a=project.assets[Number(e.target.dataset.asset)],type=a.type.startsWith('video')?'video':'image',l=baseLayer(type);l.name=a.name;l.assetId=a.name;project.layers.unshift(l);project.selected=0;renderUI();}if(e.target.dataset.assetdel!==undefined){project.assets.splice(Number(e.target.dataset.assetdel),1);renderUI();}};
function exportHTML(){let state=JSON.stringify(project).replace(/</g,'\\u003c');let html=document.documentElement.outerHTML.replace(/let project=\{version:'0.2'[\s\S]*?selected:0\};/,`let project=${state};`);download('demoforge_export_v0.2.html',html,'text/html')}function download(name,content,type){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();URL.revokeObjectURL(a.href)}$('exportHtml').onclick=()=>exportHTML();$('exportState').onclick=()=>download('demoforge_settings_v0.2.json',JSON.stringify(project,null,2),'application/json');$('importStateBtn').onclick=()=>$('importState').click();$('importState').onchange=e=>{let r=new FileReader();r.onload=ev=>{project=JSON.parse(ev.target.result);renderUI();toast('Réglages importés')};r.readAsText(e.target.files[0])};
canvas.onmousedown=e=>{let l=project.layers[project.selected];if(!l||l.locked)return;drag={canvas:true,dx:e.offsetX/canvas.clientWidth*W-l.x,dy:e.offsetY/canvas.clientHeight*H-l.y};};canvas.onmousemove=e=>{if(drag&&drag.canvas){let l=project.layers[project.selected];l.x=Math.round(e.offsetX/canvas.clientWidth*W-drag.dx);l.y=Math.round(e.offsetY/canvas.clientHeight*H-drag.dy);renderUI();}};window.onmouseup=()=>{drag=null};
function save(){try{localStorage.setItem(STORE,JSON.stringify(project))}catch(e){}}function load(){try{let s=localStorage.getItem(STORE);if(s)project=JSON.parse(s)}catch(e){} if(!project.layers||!project.layers.length)project.layers=demoLayers();}
load();renderUI();draw();})();
