<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DEMOFORGE // CLEAN INTRO</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    image-rendering: pixelated;
  }

  .crt {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.035) 0,
        rgba(255,255,255,.035) 1px,
        transparent 2px,
        transparent 5px
      ),
      radial-gradient(circle at center, transparent 58%, rgba(0,0,0,.55));
    opacity: .45;
  }
</style>
</head>
<body>
<canvas id="screen"></canvas>
<div class="crt"></div>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("screen");
  const ctx = canvas.getContext("2d", { alpha: false });

  const W = 480;
  const H = 270;

  const buffer = document.createElement("canvas");
  buffer.width = W;
  buffer.height = H;
  const g = buffer.getContext("2d", { alpha: false });

  let time = 0;
  let dpr = 1;

  const stars = Array.from({ length: 280 }, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    z: .25 + Math.random() * 1.5,
    s: .4 + Math.random() * 1.8
  }));

  const greetings =
    "   GREETINGS TO REPLICANTS  ·  AUTOMATION  ·  FOF  ·  ATM  ·  TAM  ·  BLACK SQUADRON  ·  ORION  ·  EQUINOX  ·  FAIRLIGHT  ·  POUET  ·  DEMOZOO  ·  ALL DEMOSCENE FRIENDS   ";

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  addEventListener("resize", resize);
  resize();

  function clear() {
    const bg = g.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, "#020617");
    bg.addColorStop(.52, "#09001d");
    bg.addColorStop(1, "#000000");
    g.fillStyle = bg;
    g.fillRect(0, 0, W, H);
  }

  function starfield() {
    for (const s of stars) {
      s.y += s.z * 0.32;
      s.x += Math.sin(time * .01 + s.y * .02) * .08;
      if (s.y > H) {
        s.y = 0;
        s.x = Math.random() * W;
      }

      const b = Math.min(1, s.z / 1.5);
      g.fillStyle = b > .75 ? "#ffffff" : b > .45 ? "#7dd3fc" : "#8b5cf6";
      g.fillRect(s.x, s.y, s.s, s.s);
    }
  }

  function plasmaBackground() {
    const step = 6;
    for (let y = 0; y < H; y += step) {
      for (let x = 0; x < W; x += step) {
        const v =
          Math.sin(x * .035 + time * .018) +
          Math.cos(y * .045 + time * .015) +
          Math.sin((x + y) * .025 + time * .01);

        const a = (v + 3) / 6;
        const r = Math.floor(20 + a * 70);
        const b = Math.floor(60 + a * 150);
        const c = Math.floor(90 + a * 130);

        g.fillStyle = `rgba(${r}, ${b}, ${c}, .22)`;
        g.fillRect(x, y, step, step);
      }
    }
  }

  function rasterBars() {
    for (let i = 0; i < 12; i++) {
      const y = 150 + i * 7 + Math.sin(time * .035 + i * .7) * 6;
      const grad = g.createLinearGradient(40, y, W - 40, y);
      grad.addColorStop(0, "#ff2d75");
      grad.addColorStop(.25, "#ff8a00");
      grad.addColorStop(.5, "#fff200");
      grad.addColorStop(.75, "#00e5ff");
      grad.addColorStop(1, "#8b5cf6");

      g.fillStyle = grad;
      g.fillRect(48, y, W - 96, 4);
    }
  }

  function grid() {
    const horizon = 170;

    g.strokeStyle = "rgba(0, 229, 255, .42)";
    g.lineWidth = 1;

    for (let i = 0; i < 15; i++) {
      const y = horizon + i * i * .55;
      g.beginPath();
      g.moveTo(0, y);
      g.lineTo(W, y);
      g.stroke();
    }

    for (let i = -14; i <= 14; i++) {
      const x = W / 2 + i * 18;
      g.beginPath();
      g.moveTo(W / 2, horizon);
      g.lineTo(x, H);
      g.stroke();
    }
  }

  function logoText() {
    const y = 78 + Math.sin(time * .025) * 3;

    g.textAlign = "center";
    g.textBaseline = "middle";

    g.font = "900 46px Arial Black, Impact, sans-serif";
    g.lineWidth = 7;
    g.strokeStyle = "#000000";
    g.strokeText("DEMOFORGE", W / 2, y);

    const grad = g.createLinearGradient(0, y - 30, 0, y + 35);
    grad.addColorStop(0, "#ffffff");
    grad.addColorStop(.28, "#00e5ff");
    grad.addColorStop(.55, "#8b5cf6");
    grad.addColorStop(.78, "#ff8a00");
    grad.addColorStop(1, "#fff200");

    g.fillStyle = grad;
    g.fillText("DEMOFORGE", W / 2, y);

    g.lineWidth = 2;
    g.strokeStyle = "#ffffff";
    g.strokeText("DEMOFORGE", W / 2, y);
  }

  function subtitle() {
    g.textAlign = "center";
    g.textBaseline = "middle";

    g.font = "700 15px Arial, sans-serif";
    g.lineWidth = 5;
    g.strokeStyle = "#000000";
    g.strokeText("A SIMPLE DEMOSCENE EDITOR", W / 2, 122);
    g.fillStyle = "#e0ffff";
    g.fillText("A SIMPLE DEMOSCENE EDITOR", W / 2, 122);

    g.font = "700 12px Arial, sans-serif";
    g.strokeText("LAYERS · EFFECTS · EXPORT · CULTURE", W / 2, 142);
    g.fillStyle = "#fef08a";
    g.fillText("LAYERS · EFFECTS · EXPORT · CULTURE", W / 2, 142);
  }

  function manifesto() {
    const lines = [
      "CODE IS ART",
      "CONSTRAINT IS FREEDOM",
      "SHARE THE CULTURE"
    ];

    g.textAlign = "center";
    g.font = "700 10px Arial, sans-serif";

    for (let i = 0; i < lines.length; i++) {
      const x = W / 2 + (i - 1) * 128;
      const y = 24;
      g.lineWidth = 4;
      g.strokeStyle = "#000000";
      g.strokeText(lines[i], x, y);
      g.fillStyle = i === 1 ? "#fef08a" : "#93c5fd";
      g.fillText(lines[i], x, y);
    }
  }

  function scroller() {
    const y = 238;
    const speed = 1.25;
    const textWidth = greetings.length * 8.6;
    const x = W - ((time * speed) % (W + textWidth));

    g.fillStyle = "rgba(0, 0, 0, .76)";
    g.fillRect(0, 219, W, 38);

    g.strokeStyle = "#00e5ff";
    g.lineWidth = 1;
    g.beginPath();
    g.moveTo(0, 219);
    g.lineTo(W, 219);
    g.moveTo(0, 257);
    g.lineTo(W, 257);
    g.stroke();

    g.font = "900 15px Arial, sans-serif";
    g.textAlign = "left";
    g.textBaseline = "middle";

    for (let i = 0; i < greetings.length; i++) {
      const px = x + i * 8.6;
      const py = y + Math.sin(time * .06 + i * .35) * 3;

      g.lineWidth = 4;
      g.strokeStyle = "#000000";
      g.strokeText(greetings[i], px, py);

      const hue = (i * 9 + time * 2) % 360;
      g.fillStyle = `hsl(${hue}, 100%, 72%)`;
      g.fillText(greetings[i], px, py);
    }
  }

  function cornerInfo() {
    g.textAlign = "left";
    g.textBaseline = "top";
    g.font = "700 9px Arial, sans-serif";
    g.lineWidth = 3;
    g.strokeStyle = "#000";
    g.fillStyle = "#a7f3d0";

    const lines = [
      "HTML SINGLE FILE",
      "NO LIBRARY / NO ASSET",
      "OPEN DIRECTLY"
    ];

    lines.forEach((line, i) => {
      g.strokeText(line, 10, 185 + i * 11);
      g.fillText(line, 10, 185 + i * 11);
    });
  }

  function renderToScreen() {
    ctx.imageSmoothingEnabled = false;

    const scale = Math.max(innerWidth / W, innerHeight / H);
    const dw = W * scale;
    const dh = H * scale;
    const dx = (innerWidth - dw) / 2;
    const dy = (innerHeight - dh) / 2;

    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, innerWidth, innerHeight);

    ctx.drawImage(buffer, dx, dy, dw, dh);

    ctx.globalCompositeOperation = "screen";
    ctx.globalAlpha = .08;
    ctx.drawImage(buffer, dx + 2, dy, dw, dh);
    ctx.drawImage(buffer, dx - 2, dy, dw, dh);
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = "source-over";
  }

  function frame() {
    clear();
    plasmaBackground();
    starfield();
    grid();
    rasterBars();
    manifesto();
    logoText();
    subtitle();
    cornerInfo();
    scroller();
    renderToScreen();

    time += 1;
    requestAnimationFrame(frame);
  }

  frame();
})();
</script>
</body>
</html>
