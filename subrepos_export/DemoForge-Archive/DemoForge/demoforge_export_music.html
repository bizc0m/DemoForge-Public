function drawBigScroll(c,l,time){const y=layerY(l,time),size=l.size,text="   "+l.text+"   ",speed=l.speed/10,charW=size*.63,total=text.length*charW,scrollTime=animationActive(l,time)?time:0,x=((l.allowOffscreen==="on"||l.allowOffscreen==="force")?W:Math.max(0,W-size))-((scrollTime*speed)%(W+total));c.fillStyle="rgba(0,0,0,.82)";c.fillRect(0,l.minY,W,Math.max(size+30,l.maxY-l.minY));c.strokeStyle=l.colorB;c.lineWidth=1;c.beginPath();c.moveTo(0,l.minY);c.lineTo(W,l.minY);c.moveTo(0,l.maxY);c.lineTo(W,l.maxY);c.stroke();c.font=`900 ${size}px ${l.font}`;c.textAlign="left";c.textBaseline="middle";for(let i=0;i<text.length;i++){const px=x+i*charW;if(px<-60||px>W+60)continue;const py=y+(l.fixed==="on"?0:Math.sin(time*.075+i*.34)*l.amp);c.lineWidth=6;c.strokeStyle="#000";c.strokeText(text[i],px,py);textFill(c,l,px,py,i);c.fillText(text[i],px,py)}}
function drawEq(c,l){const min=l.minY,base=l.maxY,barW=l.size||9,gap=4,n=l.amount||32,start=(W-(n*(barW+gap)-gap))/2,maxH=Math.max(8,base-min);c.fillStyle="rgba(0,0,0,.65)";c.fillRect(0,min,W,maxH);for(let i=0;i<n;i++){const v=spectrum[i%spectrum.length],h=Math.min(maxH-2,4+v*(maxH*1.55)),x=start+i*(barW+gap),y=base-h,grad=c.createLinearGradient(0,base,0,min);grad.addColorStop(0,l.colorA);grad.addColorStop(.48,"#ffcc00");grad.addColorStop(1,l.colorB);c.fillStyle="rgba(0,0,0,.5)";c.fillRect(x-1,min,barW+2,maxH);c.fillStyle=grad;c.fillRect(x,y,barW,h);c.fillStyle="rgba(255,255,255,.85)";c.fillRect(x,y,barW,1)}}
function drawScroll(c,l,time){const y=layerY(l,time),size=l.size,text="   "+l.text+"   ",speed=l.speed/10,charW=size*.62,total=text.length*charW,scrollTime=animationActive(l,time)?time:0,x=((l.allowOffscreen==="on"||l.allowOffscreen==="force")?W:Math.max(0,W-size))-((scrollTime*speed)%(W+total));c.fillStyle="rgba(0,0,0,.84)";c.fillRect(0,l.minY,W,Math.max(size+18,l.maxY-l.minY));c.font=`900 ${size}px ${l.font}`;c.textAlign="left";c.textBaseline="middle";for(let i=0;i<text.length;i++){const px=x+i*charW,py=y+(l.fixed==="on"?0:Math.sin(time*.06+i*.31)*l.amp);c.lineWidth=3;c.strokeStyle="#000";c.strokeText(text[i],px,py);textFill(c,l,px,py,i);c.fillText(text[i],px,py)}}
function drawScanlines(c,l){c.fillStyle=`rgba(0,0,0,${(l.opacity||30)/100})`;for(let y=0;y<H;y+=Math.max(2,l.size||3))c.fillRect(0,y,W,1)}
function render(){drawScene(g,t);ctx.imageSmoothingEnabled=false;ctx.fillStyle="#000";ctx.fillRect(0,0,innerWidth,innerHeight);const scale=Math.max(innerWidth/W,innerHeight/H),dw=W*scale,dh=H*scale;ctx.drawImage(buffer,(innerWidth-dw)/2,(innerHeight-dh)/2,dw,dh);t++;requestAnimationFrame(render)}

function b64ToBytes(b64){const bin=atob(b64),out=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)out[i]=bin.charCodeAt(i);return out}
function parseHeader(data){const u32=off=>data[off]|(data[off+1]<<8)|(data[off+2]<<16)|(data[off+3]<<24);const snClock=u32(0x0C)>>>0,totalSamples=u32(0x18)>>>0,dataOffRaw=u32(0x34)>>>0,dataOffset=dataOffRaw?0x34+dataOffRaw:0x40;return{snClock,totalSamples,dataOffset}}
function parseVGM(data,h){let p=h.dataOffset,sample=0,out=[];while(p<data.length){const cmd=data[p++];if(cmd===0x50)out.push({sample,type:"sn",value:data[p++]});else if(cmd===0x4F)p+=1;else if(cmd===0x61){const n=data[p]|(data[p+1]<<8);p+=2;sample+=n}else if(cmd===0x62)sample+=735;else if(cmd===0x63)sample+=882;else if(cmd>=0x70&&cmd<=0x7F)sample+=(cmd&15)+1;else if(cmd===0x66)break;else if(cmd===0x67){if(data[p]===0x66){p++;p++;const size=data[p]|(data[p+1]<<8)|(data[p+2]<<16)|(data[p+3]<<24);p+=4+size}}else{if([0x51,0x52,0x53,0x54,0x55,0x56,0x57,0x58,0x59,0x5A,0x5B,0x5C,0x5D,0x5E,0x5F,0xA0,0xB0,0xB1,0xB2,0xB3,0xB4,0xB5,0xB6,0xB7,0xB8,0xB9,0xBA,0xBB,0xBC,0xBD,0xBE,0xBF].includes(cmd))p+=2;else if([0xC0,0xC1,0xC2,0xC3,0xC4,0xC5,0xC6,0xC7,0xC8,0xD0,0xD1,0xD2,0xD3,0xD4,0xD5,0xD6].includes(cmd))p+=3}}return out}
class MusicChip{constructor(clock,sampleRate){this.clock=clock||3579545;this.sampleRate=sampleRate;this.tone=[0x3ff,0x3ff,0x3ff];this.vol=[15,15,15,15];this.noise=0;this.latchChan=0;this.latchType=0;this.phase=[0,0,0];this.out=[1,1,1];this.lfsr=0x8000;this.noiseCounter=0;this.noiseOut=1;this.volumeTable=[];for(let i=0;i<16;i++)this.volumeTable[i]=i>=15?0:Math.pow(10,-i*2/20)}write(v){if(v&0x80){const ch=(v>>5)&3,type=(v>>4)&1,data=v&15;this.latchChan=ch;this.latchType=type;if(type)this.vol[ch]=data;else{if(ch<3)this.tone[ch]=(this.tone[ch]&0x3F0)|data;else{this.noise=data;this.lfsr=0x8000}}}else{const data=v&0x3F;if(!this.latchType&&this.latchChan<3)this.tone[this.latchChan]=(this.tone[this.latchChan]&0x00F)|(data<<4)}}next(){let mix=0;for(let ch=0;ch<3;ch++){const n=Math.max(1,this.tone[ch]),freq=this.clock/(32*n);this.phase[ch]+=freq/this.sampleRate;if(this.phase[ch]>=1){this.phase[ch]-=Math.floor(this.phase[ch]);this.out[ch]=-this.out[ch]}const amp=this.volumeTable[this.vol[ch]],v=this.out[ch]*amp;mix+=v*.24;vu[ch]=vu[ch]*.94+Math.abs(v)*.06}const mode=this.noise&3;let nf=mode===0?this.clock/512:mode===1?this.clock/1024:mode===2?this.clock/2048:this.clock/(32*Math.max(1,this.tone[2]));this.noiseCounter+=nf/this.sampleRate;if(this.noiseCounter>=1){this.noiseCounter-=Math.floor(this.noiseCounter);const white=(this.noise&4)!==0,fb=white?((this.lfsr&1)^((this.lfsr>>3)&1)):(this.lfsr&1);this.lfsr=(this.lfsr>>1)|(fb<<15);this.noiseOut=(this.lfsr&1)?1:-1}const namp=this.volumeTable[this.vol[3]],nv=this.noiseOut*namp;mix+=nv*.16;vu[3]=vu[3]*.94+Math.abs(nv)*.06;const global=Math.abs(mix);for(let i=0;i<spectrum.length;i++){const src=vu[i%4]*(.7+.3*Math.sin(t*.07+i));spectrum[i]=spectrum[i]*.88+src*.12+global*.03}return Math.max(-1,Math.min(1,mix))}}
