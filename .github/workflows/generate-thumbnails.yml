name: Generate HTML thumbnails

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths:
      - "**/*.html"
      - "scripts/generate-thumbnails.mjs"
      - "package.json"
      - ".github/workflows/generate-thumbnails.yml"

permissions:
  contents: write

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Install Chromium for Playwright
        run: npx playwright install --with-deps chromium

      - name: Generate thumbnails
        run: npm run screenshots

      - name: Commit generated thumbnails
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: generate HTML thumbnails"
          file_pattern: assets/thumbs/*.png
